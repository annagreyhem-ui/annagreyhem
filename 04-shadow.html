<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem – Lost places in my mind</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; width:100vw; height:100vh;
  overflow:hidden; cursor:none;
  font-family:'IM Fell English',serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
}
.cursor {
  position:fixed; width:8px; height:8px; background:white;
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
}
h1 {
  color:white; font-style:italic; font-weight:normal;
  font-size:clamp(20px,3vw,36px);
  letter-spacing:0.15em; text-align:center;
  animation:fadein 3s forwards;
}
p {
  color:#555; font-style:italic;
  font-size:clamp(13px,1.6vw,18px);
  letter-spacing:0.1em; text-align:center;
  animation:fadein 3s 1.5s forwards; opacity:0;
}
@keyframes fadein { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<h1>Lost places in my mind</h1>
<p>You found it.</p>
<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
</script>
</body>
</html>
