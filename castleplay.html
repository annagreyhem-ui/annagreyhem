<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    border-bottom: 1px solid #1a1a1a;
  }

  #topbar span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0.35em;
    color: #fff;
    font-weight: 400;
    cursor: pointer;
  }

  /* ── CASTLE WRAPPER ── */
  #castle-wrapper {
    position: fixed;
    top: 44px;
    left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  #castle-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    user-select: none;
    pointer-events: none;
  }

  /* ── HOTSPOTS ── */
  .hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    transition: background 0.25s ease;
    border-radius: 3px;
    z-index: 10;
  }

  .hotspot:hover {
    background: rgba(120, 0, 0, 0.13);
    outline: 1px solid rgba(180, 0, 0, 0.25);
  }

  .hotspot .label {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0);
    transition: color 0.25s ease;
    pointer-events: none;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  }

  .hotspot:hover .label {
    color: rgba(255, 255, 255, 0.75);
  }

  /* ── ROOM VIEW — fullscreen below topbar ── */
  #room-view {
    display: none;
    position: fixed;
    top: 44px;
    left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 400;
    animation: fadeIn 0.4s ease forwards;
  }

  #room-view.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Room image fills the entire space */
  #room-view img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* Placeholder when no image yet */
  #room-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #050505;
  }

  #room-placeholder .ph-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 32px;
    letter-spacing: 0.3em;
    color: #1e1e1e;
  }

  #room-placeholder .ph-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: #151515;
    max-width: 400px;
    text-align: center;
    line-height: 1.8;
  }

  #room-placeholder .ph-soon {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #111;
    margin-top: 8px;
  }

  /* Room name overlay bottom left */
  #room-caption {
    position: absolute;
    bottom: 32px;
    left: 36px;
    pointer-events: none;
  }

  #room-caption .cap-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }

  #room-caption .cap-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
  }

  /* Back hint top left */
  #back-btn {
    position: absolute;
    top: 14px;
    left: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    z-index: 10;
  }

  #back-btn:hover {
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<!-- TOP BAR — always on top, clicking name goes back to castle -->
<div id="topbar">
  <span onclick="closeRoom()">Anna Greyhem</span>
</div>

<!-- CASTLE -->
<div id="castle-wrapper">
  <img id="castle-img" src="castle.png" alt="" draggable="false" />

  <!-- THE BEDROOM -->
  <div class="hotspot" style="left:2%; top:2%; width:21%; height:46%;"
       onclick="openRoom('bedroom')">
    <span class="label">The Bedroom</span>
  </div>

  <!-- THE LIBRARY -->
  <div class="hotspot" style="left:2%; top:50%; width:26%; height:26%;"
       onclick="openRoom('library')">
    <span class="label">The Library</span>
  </div>

  <!-- THE DRAWING ROOM -->
  <div class="hotspot" style="left:2%; top:77%; width:26%; height:22%;"
       onclick="openRoom('drawing')">
    <span class="label">The Drawing Room</span>
  </div>

  <!-- THE CHILDREN'S ROOM -->
  <div class="hotspot" style="left:54%; top:2%; width:26%; height:44%;"
       onclick="openRoom('children')">
    <span class="label">The Children's Room</span>
  </div>

  <!-- THE CORRIDOR -->
  <div class="hotspot" style="left:54%; top:48%; width:26%; height:27%;"
       onclick="openRoom('corridor')">
    <span class="label">The Corridor</span>
  </div>

  <!-- THE APOTHECARY -->
  <div class="hotspot" style="left:54%; top:77%; width:26%; height:22%;"
       onclick="openRoom('apothecary')">
    <span class="label">The Apothecary</span>
  </div>
</div>

<!-- ROOM VIEW — fullscreen -->
<div id="room-view">
  <button id="back-btn" onclick="closeRoom()">← back</button>
  <div id="room-image-wrap" style="width:100%;height:100%;"></div>
  <div id="room-caption">
    <div class="cap-name" id="cap-name"></div>
    <div class="cap-desc" id="cap-desc"></div>
  </div>
</div>

<script>
const rooms = {
  bedroom: {
    name: "The Bedroom",
    desc: "She was beautiful, frozen, waiting.",
    img: "rooms/bedroom.png"
  },
  library: {
    name: "The Library",
    desc: "She left the book open. She always does.",
    img: "rooms/library.png"
  },
  drawing: {
    name: "The Drawing Room",
    desc: "She set the table for twelve. No one came. She wasn't surprised.",
    img: "rooms/drawing.png"
  },
  children: {
    name: "The Children's Room",
    desc: "Every wall a memory. Every painting a door that never opened.",
    img: "rooms/children.png"
  },
  corridor: {
    name: "The Corridor",
    desc: "Somewhere in here, a staircase leads somewhere it shouldn't.",
    img: "rooms/corridor.png"
  },
  apothecary: {
    name: "The Apothecary",
    desc: "Not everything in those bottles has a name.",
    img: "rooms/apothecary.png"
  }
};

function openRoom(id) {
  const room = rooms[id];
  const view = document.getElementById('room-view');
  const wrap = document.getElementById('room-image-wrap');

  document.getElementById('cap-name').textContent = room.name;
  document.getElementById('cap-desc').textContent = room.desc;

  wrap.innerHTML = '';

  const img = new Image();
  img.onload = () => {
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:center;display:block;';
    wrap.appendChild(img);
  };
  img.onerror = () => {
    wrap.innerHTML = `
      <div id="room-placeholder">
        <div class="ph-name">${room.name}</div>
        <div class="ph-desc">${room.desc}</div>
        <div class="ph-soon">coming soon.</div>
      </div>`;
  };
  img.src = room.img;

  view.classList.add('active');
}

function closeRoom() {
  document.getElementById('room-view').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRoom();
});
</script>
</body>
</html>
