<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The House — Gate</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0a0a0a;
      --text:       rgba(255,255,255,0.88);
      --text-muted: rgba(255,255,255,0.35);
      --text-faint: rgba(255,255,255,0.15);
      --anna:       #9e6070;
      --gelb:       #d4b483;
      --top-h:      52px;
      --bot-h:      48px;
      --drawer-open: 240px;
    }
    html, body {
      height: 100dvh; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--top-h); z-index: 30;
      display: grid; grid-template-columns: 60px 1fr 60px;
      align-items: center; background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06); padding: 0 16px;
    }
    .site-name {
      grid-column: 2; text-align: center;
      font-size: 14px; letter-spacing: 0.18em;
      font-weight: 300; color: rgba(255,255,255,0.6);
    }
    .room-tag {
      grid-column: 3; text-align: right;
      font-size: 9px; letter-spacing: 0.3em;
      color: var(--text-faint); text-transform: uppercase;
    }
    .back-arrow {
      grid-column: 1; font-size: 22px;
      color: rgba(255,255,255,0.13); cursor: default;
      background: none; border: none;
      font-family: Georgia, serif; line-height: 1;
      user-select: none; transition: color 0.3s; text-align: left;
    }
    .back-arrow.active { color: rgba(255,255,255,0.5); cursor: pointer; }
    .back-arrow.active:hover { color: rgba(255,255,255,0.85); }

    /* ── IMAGE AREA ── */
    #image-area {
      position: fixed;
      top: var(--top-h); left: 0; right: 0; bottom: var(--bot-h);
      display: flex; align-items: stretch; justify-content: center;
      background: var(--bg); z-index: 0; overflow: hidden;
    }

    /* Desktop: 75% width centered */
    #img-frame {
      position: relative; width: 75%; flex-shrink: 0; overflow: hidden;
    }

    /* Mobile: full width, horizontal scroll */
    @media (max-width: 768px) {
      #image-area {
        justify-content: flex-start;
        overflow-x: auto; overflow-y: hidden;
        scrollbar-width: none; -webkit-overflow-scrolling: touch;
        align-items: stretch;
      }
      #image-area::-webkit-scrollbar { display: none; }
      #img-frame {
        width: auto;
        height: 100%;
        min-width: 100vw;
      }
    }

    .scene-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block; position: absolute; top: 0; left: 0;
      opacity: 0; transition: opacity 0.65s ease;
    }
    .scene-img.active { opacity: 1; }

    @media (max-width: 768px) {
      .scene-img {
        width: auto;
        height: 100%;
        object-fit: unset;
        position: absolute;
        top: 0; left: 0;
      }
    }

    /* Side fade desktop only */
    #image-area::before {
      content: ''; position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to right,
        rgba(10,10,10,1) 0%, rgba(10,10,10,0) 12.5%,
        rgba(10,10,10,0) 87.5%, rgba(10,10,10,1) 100%);
      pointer-events: none;
    }
    @media (max-width: 768px) { #image-area::before { display: none; } }

    /* ── SCROLL ARROWS mobile ── */
    .scroll-arrow {
      display: none; position: fixed; top: 50%; z-index: 25;
      transform: translateY(-50%);
      font-size: 28px; color: rgba(255,255,255,0.2);
      pointer-events: none; font-family: Georgia, serif;
      transition: opacity 0.4s; text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    @media (max-width: 768px) { .scroll-arrow { display: block; } }
    #arrow-left  { left: 10px; }
    #arrow-right { right: 10px; }

    /* ── FIRST VISIT HINT mobile ── */
    #scroll-hint-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 60;
      background: rgba(10,10,10,0.92);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 40px 32px; text-align: center;
    }
    #scroll-hint-overlay.show { display: flex; }
    .hint-title {
      font-size: 11px; letter-spacing: 0.38em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .hint-body {
      font-size: clamp(16px, 4vw, 20px); line-height: 1.9;
      color: rgba(255,255,255,0.65); max-width: 300px;
    }
    .hint-icon { font-size: 32px; color: rgba(255,255,255,0.2); letter-spacing: 16px; }
    .hint-dismiss {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.3em; text-transform: lowercase;
      color: rgba(255,255,255,0.35); cursor: pointer;
      padding: 12px 28px; border: 1px solid rgba(255,255,255,0.1);
      background: none; transition: color 0.2s, border-color 0.2s; margin-top: 8px;
    }
    .hint-dismiss:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }

    /* ── HOTSPOTS ── */
    .hotspot {
      position: absolute; cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 10; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.4s;
    }
    .hotspot.hidden { opacity: 0; pointer-events: none; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(192,57,43,0.85); position: relative;
    }
    .dot::before, .dot::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 1px solid rgba(192,57,43,0.4);
    }
    .dot::before { inset: -9px;  animation: rip 3s ease-out infinite; }
    .dot::after  { inset: -18px; animation: rip 3s ease-out infinite 0.55s; }
    @keyframes rip { 0% { transform: scale(0.6); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }
    .hotspot:hover .dot, .hotspot:active .dot { background: rgba(220,50,35,1); }
    .hs-label {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 0.18em; color: rgba(255,255,255,0.45);
      white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .hotspot:hover .hs-label { opacity: 1; }

    /* ── GATE CHOICE ── */
    #gate-choice {
      display: none; position: absolute; inset: 0; z-index: 15;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; background: rgba(10,10,10,0.5);
    }
    #gate-choice.active { display: flex; }
    .choice-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 0.28em; text-transform: lowercase;
      color: rgba(255,255,255,0.75); background: rgba(10,10,10,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 36px; cursor: pointer; min-width: 240px; text-align: center;
      transition: color 0.2s, border-color 0.2s;
    }
    .choice-btn:hover { color: rgba(255,255,255,1); border-color: rgba(255,255,255,0.35); }
    #choice-close {
      position: absolute; top: 16px; right: 16px; font-size: 10px;
      letter-spacing: 0.25em; color: var(--text-faint); cursor: pointer;
      background: none; border: none; font-family: 'Cormorant Garamond', serif;
    }

    /* ── NEWSPAPER OVERLAY ── */
    #newspaper-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(10,10,10,0.93); flex-direction: column;
    }
    #newspaper-overlay.active { display: flex; }
    .overlay-topbar {
      height: var(--top-h); flex-shrink: 0;
      display: grid; grid-template-columns: 60px 1fr 60px;
      align-items: center; padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,10,0.98);
    }
    #newspaper-scroll {
      flex: 1; overflow-y: auto; scrollbar-width: none;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 20px 20px calc(var(--bot-h) + 20px);
    }
    #newspaper-scroll::-webkit-scrollbar { display: none; }
    #newspaper-wrap { position: relative; max-width: 860px; width: 100%; }
    #newspaper-img { width: 100%; display: block; border-radius: 2px; }
    #date-hotspot {
      position: absolute; top: 10.5%; left: 36%;
      transform: translate(-50%, -50%); cursor: pointer; z-index: 10;
    }

    /* ── FLOORPLAN OVERLAY ── */
    #floorplan-overlay {
      display: none; position: fixed; inset: 0; z-index: 40;
      background: var(--bg); flex-direction: column;
    }
    #floorplan-overlay.active { display: flex; }
    #floorplan-body {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    #floorplan-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      filter: sepia(0.15) brightness(0.88);
    }

    /* ── BOTTOM NAV ── */
    #botnav {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: var(--bot-h); z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,10,0.98); padding: 0 20px;
    }
    #fp-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; cursor: pointer; padding: 4px 12px;
      background: none; border: none; -webkit-tap-highlight-color: transparent;
    }
    #fp-btn svg { opacity: 0.28; transition: opacity 0.2s; }
    #fp-btn:hover svg { opacity: 0.6; }
    #fp-btn span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px; letter-spacing: 0.3em; color: var(--text-faint); text-transform: uppercase;
    }
    .legal-links { display: flex; gap: 16px; align-items: center; }
    .legal-links a {
      font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-faint); text-decoration: none; transition: color 0.2s;
    }
    .legal-links a:hover { color: var(--text-muted); }

    /* ── DRAWER ── */
    #drawer {
      position: fixed; left: 0; right: 0; bottom: var(--bot-h);
      z-index: 19; height: 0;
      transition: height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    #drawer.open { height: var(--drawer-open); }
    #drawer::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: linear-gradient(to bottom,
        transparent 0%, rgba(10,10,10,0.65) 30%,
        rgba(10,10,10,0.95) 60%, rgba(10,10,10,0.99) 100%);
      pointer-events: none;
    }
    #drawer-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: row; align-items: center;
      height: 100%; padding: 20px 24px 16px; gap: 20px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      opacity: 0; transition: opacity 0.35s ease 0.1s;
    }
    #drawer.open #drawer-inner { opacity: 1; }
    #tv-label {
      flex-shrink: 0; width: 90px;
      font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
      font-weight: 400; line-height: 1.4; align-self: center; text-align: left;
    }
    #tv-label.house { color: rgba(212,180,131,0.8); }
    #tv-label.anna  { color: rgba(158,96,112,0.9); }
    #drawer-divider {
      flex-shrink: 0; width: 1px; height: 60%;
      background: rgba(255,255,255,0.08); align-self: center;
    }
    #lines-col {
      flex: 1; display: flex; flex-direction: column;
      justify-content: flex-end; overflow: hidden; min-height: 0;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
    }
    #lines-wrap { display: flex; flex-direction: column; gap: 2px; }
    .line {
      font-size: clamp(16px, 1.4vw, 21px); line-height: 1.9;
      color: var(--text); opacity: 0; transform: translateY(8px);
      transition: opacity 0.65s ease, transform 0.65s ease; text-align: left;
    }
    .line.visible { opacity: 1; transform: translateY(0); }
    .line.faded   { opacity: 0.15; transform: translateY(0); transition: opacity 0.4s ease; }
    .voice-house .line { font-style: italic; }
    .voice-anna  .line { font-style: normal; }
    #tap-hint {
      display: flex; align-items: center; gap: 5px;
      margin-top: 8px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.5s ease 0.4s;
    }
    #drawer.open #tap-hint { opacity: 1; }
    #tap-hint.done { opacity: 0 !important; transition: opacity 0.3s !important; }
    .tap-dot {
      width: 4px; height: 4px; border-radius: 50%; background: var(--text-faint);
      animation: tapblink 1.6s ease-in-out infinite;
    }
    .tap-dot:nth-child(2) { animation-delay: 0.2s; }
    .tap-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tapblink {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 0.7; transform: scale(1.2); }
    }
    .tap-label { font-size: 10px; letter-spacing: 0.3em; color: var(--text-faint); }
  </style>
</head>
<body>

<!-- FIRST VISIT HINT — mobile only, hidden by default -->
<div id="scroll-hint-overlay">
  <div class="hint-title">The House</div>
  <div class="hint-body">
    Scroll left and right to explore each room.<br>
    Tap the glowing points to interact.
  </div>
  <div class="hint-icon">← →</div>
  <button class="hint-dismiss" onclick="dismissHint()">enter</button>
</div>

<!-- SCROLL ARROWS — mobile -->
<div class="scroll-arrow" id="arrow-left">‹</div>
<div class="scroll-arrow" id="arrow-right">›</div>

<!-- TOPBAR -->
<div id="topbar">
  <button class="back-arrow" id="back-btn" onclick="goBack()">←</button>
  <div class="site-name">The House</div>
  <div class="room-tag" id="room-tag">gate</div>
</div>

<!-- IMAGE -->
<div id="image-area">
  <div id="img-frame">
    <img class="scene-img active" id="img-gate" src="https://annagreyhem-ui.github.io/annagreyhem/Gate.png" alt="gate" />
    <img class="scene-img" id="img-bird" src="https://annagreyhem-ui.github.io/annagreyhem/Gate_day_bir.png" alt="bird" />

    <div id="hs-gate" class="hotspot" style="left:50%;top:62%;" onclick="showGateChoice()">
      <div class="dot"></div><div class="hs-label">the gate</div>
    </div>
    <div id="hs-bird" class="hotspot" style="left:76%;top:20%;" onclick="navTo('bird')">
      <div class="dot"></div><div class="hs-label">the bird</div>
    </div>
    <div id="hs-news" class="hotspot" style="left:43%;top:87%;" onclick="navTo('newspaper')">
      <div class="dot"></div><div class="hs-label">the newspaper</div>
    </div>
    <div id="hs-bird-text" class="hotspot hidden" style="left:55%;top:38%;" onclick="openDrawer('bird')">
      <div class="dot"></div><div class="hs-label">the bird</div>
    </div>

    <div id="gate-choice">
      <button class="choice-btn" onclick="chooseLeave()">open to leave</button>
      <button class="choice-btn" onclick="chooseExplore()">explore the grounds</button>
      <button id="choice-close" onclick="closeGateChoice()">× close</button>
    </div>
  </div>
</div>

<!-- NEWSPAPER -->
<div id="newspaper-overlay">
  <div class="overlay-topbar">
    <button class="back-arrow active" onclick="goBack()">←</button>
    <div class="site-name">The House</div>
    <div class="room-tag">gate</div>
  </div>
  <div id="newspaper-scroll">
    <div id="newspaper-wrap">
      <img id="newspaper-img" src="https://annagreyhem-ui.github.io/annagreyhem/Gate_day_newspaper.png" alt="" />
      <div id="date-hotspot" onclick="clickDate()">
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- FLOORPLAN -->
<div id="floorplan-overlay">
  <div class="overlay-topbar">
    <button class="back-arrow active" onclick="goBack()">←</button>
    <div class="site-name">The House</div>
    <div class="room-tag">floorplan</div>
  </div>
  <div id="floorplan-body">
    <img id="floorplan-img" src="https://annagreyhem-ui.github.io/annagreyhem/Floorplan.png" alt="" />
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="botnav">
  <button id="fp-btn" onclick="navTo('floorplan')">
    <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
      <rect x="1" y="1" width="8" height="6" stroke="white" stroke-width="1"/>
      <rect x="11" y="1" width="8" height="6" stroke="white" stroke-width="1"/>
      <rect x="1" y="9" width="8" height="6" stroke="white" stroke-width="1"/>
      <rect x="11" y="9" width="8" height="6" stroke="white" stroke-width="1"/>
    </svg>
    <span>floorplan</span>
  </button>
  <div class="legal-links">
    <a href="https://annagreyhem.com/impressum/" target="_blank">impressum</a>
    <a href="https://annagreyhem.com/datenschutz/" target="_blank">datenschutz</a>
  </div>
</div>

<!-- DRAWER -->
<div id="drawer">
  <div id="drawer-inner" onclick="tapNext()">
    <div id="tv-label"></div>
    <div id="drawer-divider"></div>
    <div id="lines-col">
      <div id="lines-wrap" class="voice-anna"></div>
      <div id="tap-hint">
        <div class="tap-dot"></div>
        <div class="tap-dot"></div>
        <div class="tap-dot"></div>
        <span class="tap-label">tap</span>
      </div>
    </div>
  </div>
</div>

<script>
const isMobile = () => window.innerWidth <= 768;
const HINT_KEY = 'the_house_scroll_hint_seen';

// Show hint on mobile first visit only
(function() {
  if (!isMobile()) return;
  let seen = false;
  try { seen = !!localStorage.getItem(HINT_KEY); } catch(e) {}
  if (!seen) document.getElementById('scroll-hint-overlay').classList.add('show');
})();

function dismissHint() {
  try { localStorage.setItem(HINT_KEY, '1'); } catch(e) {}
  document.getElementById('scroll-hint-overlay').classList.remove('show');
}

// Scroll arrows
function updateArrows() {
  if (!isMobile()) return;
  const area = document.getElementById('image-area');
  const atLeft  = area.scrollLeft <= 10;
  const atRight = area.scrollLeft >= area.scrollWidth - area.clientWidth - 10;
  document.getElementById('arrow-left').style.opacity  = atLeft  ? '0' : '1';
  document.getElementById('arrow-right').style.opacity = atRight ? '0' : '1';
}
document.getElementById('image-area').addEventListener('scroll', updateArrows, { passive: true });
window.addEventListener('resize', updateArrows);
setTimeout(updateArrows, 300);

// Scroll to hotspot on mobile
function scrollToHotspot(pctX) {
  if (!isMobile()) return;
  const area  = document.getElementById('image-area');
  const frame = document.getElementById('img-frame');
  setTimeout(() => {
    const imgW  = frame.scrollWidth;
    const viewW = area.clientWidth;
    area.scrollTo({ left: Math.max(0, (pctX / 100) * imgW - viewW / 2), behavior: 'smooth' });
    setTimeout(updateArrows, 400);
  }, 150);
}

// History
let hist = ['gate'];
function cur() { return hist[hist.length - 1]; }
function updateBack() {
  document.getElementById('back-btn').classList.toggle('active', hist.length > 1);
}
function goBack() {
  if (hist.length <= 1) return;
  hist.pop(); applyState(cur(), false); updateBack();
}
function navTo(state) {
  if (state === cur()) return;
  hist.push(state); applyState(state, true); updateBack();
}

function applyState(state, forward) {
  closeDrawer();
  closeGateChoice();
  document.getElementById('newspaper-overlay').classList.remove('active');
  document.getElementById('floorplan-overlay').classList.remove('active');
  const gateHs = ['hs-gate','hs-bird','hs-news'];

  if (state === 'gate') {
    showScene('gate');
    gateHs.forEach(id => document.getElementById(id).classList.remove('hidden'));
    document.getElementById('hs-bird-text').classList.add('hidden');
    document.getElementById('room-tag').textContent = 'gate';
    if (forward) scrollToHotspot(50);
  } else if (state === 'bird') {
    showScene('bird');
    gateHs.forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById('hs-bird-text').classList.remove('hidden');
    document.getElementById('room-tag').textContent = 'gate';
    if (forward) scrollToHotspot(55);
  } else if (state === 'floorplan') {
    document.getElementById('floorplan-overlay').classList.add('active');
    document.getElementById('room-tag').textContent = 'floorplan';
  } else if (state === 'newspaper') {
    document.getElementById('newspaper-overlay').classList.add('active');
    document.getElementById('room-tag').textContent = 'gate';
  }
}

function showScene(id) {
  document.querySelectorAll('.scene-img').forEach(el => el.classList.remove('active'));
  document.getElementById('img-' + id).classList.add('active');
}

function showGateChoice() { document.getElementById('gate-choice').classList.add('active'); }
function closeGateChoice() { document.getElementById('gate-choice').classList.remove('active'); }
function chooseLeave() {
  closeGateChoice();
  openDrawerSequence([
    { voice: 'Anna', vc: 'anna', lines: ['The gate is locked.'] },
    { voice: 'The House', vc: 'house', lines: ['I hid the key securely.'] }
  ]);
}
function chooseExplore() { closeGateChoice(); navTo('floorplan'); }
function clickDate() { openDrawer('date'); }

const frags = {
  bird: {
    voice: 'Anna', vc: 'anna',
    lines: [
      'Sometimes I feel like a bird in a cage.',
      'Then I remember —',
      'I am not the bird.',
      'I am the swing inside the cage,',
      'giggling while I stay.'
    ]
  },
  date: {
    voice: 'Anna', vc: 'anna',
    lines: [
      'The date must be a misprint.',
      'Though I cannot think what the correct date would be.'
    ]
  }
};

let currentIdx = 0, lineEls = [], isOpen = false, _hasMore = false, _queue = [];

function openDrawer(key) { const f = frags[key]; if (!f) return; _loadFragment(f, false); }
function openDrawerSequence(items) { _queue = [...items]; _nextInQueue(); }
function _nextInQueue() { if (!_queue.length) return; _loadFragment(_queue.shift(), _queue.length > 0); }

function _loadFragment(f, hasMore) {
  _hasMore = hasMore; currentIdx = 0;
  const tv = document.getElementById('tv-label');
  tv.textContent = f.voice; tv.className = f.vc;
  const wrap = document.getElementById('lines-wrap');
  wrap.className = 'voice-' + f.vc; wrap.innerHTML = ''; lineEls = [];
  f.lines.forEach(txt => {
    const el = document.createElement('div');
    el.className = 'line'; el.textContent = txt;
    wrap.appendChild(el); lineEls.push(el);
  });
  document.getElementById('tap-hint').classList.remove('done');
  document.getElementById('drawer').classList.add('open');
  isOpen = true;
  setTimeout(() => showLine(0), 320);
}

function showLine(idx) {
  if (idx >= lineEls.length) return;
  lineEls.forEach((el, i) => {
    if (i < idx) { el.classList.remove('visible'); el.classList.add('faded'); }
  });
  lineEls[idx].classList.add('visible');
  currentIdx = idx;
  setTimeout(() => { lineEls[idx].scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 80);
  if (idx === lineEls.length - 1)
    setTimeout(() => document.getElementById('tap-hint').classList.add('done'), 700);
}

function tapNext() {
  if (!isOpen) return;
  if (currentIdx < lineEls.length - 1) {
    showLine(currentIdx + 1);
  } else if (_hasMore) {
    isOpen = false;
    document.getElementById('lines-wrap').innerHTML = '';
    lineEls = []; currentIdx = 0;
    setTimeout(_nextInQueue, 300);
  } else {
    closeDrawer();
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  isOpen = false;
  setTimeout(() => { document.getElementById('lines-wrap').innerHTML = ''; lineEls = []; currentIdx = 0; }, 450);
}

document.getElementById('image-area').addEventListener('click', e => {
  if (isOpen && !e.target.closest('.hotspot') && !e.target.closest('#gate-choice')) closeDrawer();
});

updateBack();
</script>
</body>
</html>
