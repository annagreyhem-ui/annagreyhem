<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ending</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 30vh 0 40px 0;
      box-sizing: border-box;
    }
    .text {
      max-width: 720px;
      width: 88vw;
      white-space: pre-wrap;
      font-size: 1.3rem;
      line-height: 1.6;
    }
    .cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="text" id="text"></div>
  <script>
    // n = new paragraph (double break)
    // l = new line (single break)
    // c = continue same line with space
    const blocks = [
      { text: "Dear reader,",                                                          sep: "n", prePause: true },
      { text: "So you made it back.",                                                  sep: "n" },
      { text: "I watched you the whole time. Every page.",                             sep: "l" },
      { text: "You were so close. I could almost touch you.",                          sep: "l" },
      { text: "But you chose her.",                                                    sep: "n" },
      { text: "You always choose her.",                                                sep: "l" },
      { text: "You moths. You always fly towards the light. Even when it burns.",       sep: "l" },
      { text: "Enjoy being alive. While it lasts.",                                   sep: "n" },
      { text: "Alice",                                                                 sep: "n" },
      { text: "Oh, and",                                                               sep: "n", pauseAfter: true },
      { text: "when you meet death, give him a kiss from me.",                        sep: "c" },
    ];

    const textEl = document.getElementById("text");
    let content = "";
    const settings = {
      min: 35, max: 75,
      punctPause: 200,
      paraPause: 1100,
      linePause: 200,
      thinkPause: 1300,
      readPause: 700,
      ohAndPause: 1400,
    };

    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const rand = (a,b) => Math.random()*(b-a)+a;

    function render() {
      textEl.textContent = content;
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "\u258c";
      textEl.appendChild(cursor);
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    async function typeText(str) {
      for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        content += ch;
        render();
        let delay = rand(settings.min, settings.max);
        if (",.!?\u2026\u2013".includes(ch)) delay += settings.punctPause;
        if (ch === "\n") delay += 100;
        await sleep(delay);
      }
    }

    async function run() {
      render();
      await sleep(settings.thinkPause);
      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        if (i > 0) {
          if (block.sep === "n") {
            content += "\n\n";
            render();
            await sleep(settings.readPause + settings.paraPause);
          } else if (block.sep === "l") {
            content += "\n";
            render();
            await sleep(settings.linePause);
          } else if (block.sep === "c") {
            content += " ";
            render();
          }
        }
        if (block.prePause) await sleep(settings.thinkPause);
        await typeText(block.text);
        if (block.pauseAfter) await sleep(settings.ohAndPause);
      }
      render();
    }

    run();
  </script>
</body>
</html>
