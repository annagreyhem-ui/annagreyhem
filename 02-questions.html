<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background:#000; width:100vw; height:100vh;
  overflow:hidden; 
  font-family:'Cormorant Garamond', serif;
}

#scene {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:64px; padding:40px;
}

#question-wrap {
  display:flex; flex-direction:column;
  align-items:center; gap:48px;
  max-width:680px; width:100%;
}

#question-text {
  color:white;
  font-size:clamp(22px,3vw,34px);
  font-style:italic;
  text-align:center;
  letter-spacing:0.08em;
  line-height:1.6;
  opacity:0;
  transition:opacity 0.8s;
}

#options {
  display:flex; flex-direction:column;
  align-items:center; gap:32px;
  width:100%;
}

.option {
  color:#555;
  font-size:clamp(17px,2.2vw,26px);
  font-style:italic;
  letter-spacing:0.12em;
  
  transition:color 0.25s;
  text-align:center;
  opacity:0;
  transition:opacity 0.6s, color 0.25s;
  position:relative;
  padding:6px 0;
}
.option:hover { color:#ccc; }
.option.chosen { color:#fff; }

/* rabbit sits at bottom centre, hops in place */
#rabbit-wrap {
  position:fixed;
  bottom:36px;
  left:50%;
  transform:translateX(-50%);
  z-index:200;
  pointer-events:none;
  transition: left 0.7s cubic-bezier(0.34,1.2,0.64,1);
}
#rabbit-wrap svg {
  width:52px; height:62px;
  animation:hop-s 0.55s ease-in-out infinite alternate;
  transform-origin:bottom center;
  display:block;
}
@keyframes hop-s {
  0%   { transform:translateY(0)    scaleY(1)    scaleX(1); }
  35%  { transform:translateY(0)    scaleY(0.86) scaleX(1.1); }
  100% { transform:translateY(-9px) scaleY(1.07) scaleX(0.95); }
}
@media (max-width: 768px) { body, p, h1, h2, div { font-size: clamp(18px, 4.5vw, 22px) !important; } }
</style>
</head>
<body>


<div id="scene">
  <div id="question-wrap">
    <div id="question-text"></div>
    <div id="options">
      <div class="option" id="opt-a" onclick="choose('A')"></div>
      <div class="option" id="opt-b" onclick="choose('B')"></div>
    </div>
  </div>
</div>

<div id="rabbit-wrap">
  <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="85" rx="22" ry="26" fill="white"/>
    <ellipse cx="50" cy="55" rx="18" ry="16" fill="white"/>
    <ellipse cx="38" cy="28" rx="6" ry="18" fill="white" transform="rotate(-8 38 42)"/>
    <ellipse cx="38" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(-8 38 42)"/>
    <ellipse cx="62" cy="28" rx="6" ry="18" fill="white" transform="rotate(8 62 42)"/>
    <ellipse cx="62" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(8 62 42)"/>
    <circle cx="43" cy="52" r="2.5" fill="#111"/>
    <circle cx="43.8" cy="51.2" r="0.8" fill="white"/>
    <circle cx="57" cy="52" r="2.5" fill="#111"/>
    <circle cx="57.8" cy="51.2" r="0.8" fill="white"/>
    <ellipse cx="50" cy="60" rx="2" ry="1.2" fill="#ffb6c1"/>
    <line x1="18" y1="58" x2="40" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="18" y1="62" x2="40" y2="61" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="82" y1="58" x2="60" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="82" y1="62" x2="60" y2="61" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <circle cx="71" cy="90" r="7" fill="white"/>
    <ellipse cx="36" cy="105" rx="7" ry="5" fill="white"/>
    <ellipse cx="64" cy="105" rx="7" ry="5" fill="white"/>
  </svg>
</div>

<script>

const questions = [
  {
    q: 'What did the blood moon wish for?',
    a: 'To spend time with her sister',
    b: 'That more people would die'
  },
  {
    q: 'The glitter fades. What is left?',
    a: 'The person beneath',
    b: 'The dark you were hiding'
  },
  {
    q: 'What is madness?',
    a: 'The opposite of art',
    b: 'The price of it'
  }
];

let current = 0;
let answers = [];

const qText  = document.getElementById('question-text');
const optA   = document.getElementById('opt-a');
const optB   = document.getElementById('opt-b');
const rabbit = document.getElementById('rabbit-wrap');

function showQuestion(index) {
  qText.style.opacity  = '0';
  optA.style.opacity   = '0';
  optB.style.opacity   = '0';

  setTimeout(() => {
    const q = questions[index];
    qText.textContent = q.q;
    optA.textContent  = 'A)  ' + q.a;
    optB.textContent  = 'B)  ' + q.b;
    optA.classList.remove('chosen');
    optB.classList.remove('chosen');

    qText.style.opacity = '1';
    setTimeout(() => { optA.style.opacity = '1'; }, 200);
    setTimeout(() => { optB.style.opacity = '1'; }, 400);

    // reset rabbit to centre
    rabbit.style.transition = 'none';
    rabbit.style.left = '50%';
  }, 500);
}

function choose(letter) {
  answers.push(letter);

  const chosenEl = letter === 'A' ? optA : optB;
  chosenEl.classList.add('chosen');

  // move rabbit to chosen option
  const rect   = chosenEl.getBoundingClientRect();
  const centre = rect.left + rect.width / 2;
  rabbit.style.transition = 'left 0.7s cubic-bezier(0.34,1.2,0.64,1)';
  rabbit.style.left = centre + 'px';

  // disable clicking while animating
  optA.style.pointerEvents = 'none';
  optB.style.pointerEvents = 'none';

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion(current);
      optA.style.pointerEvents = 'auto';
      optB.style.pointerEvents = 'auto';
    } else {
      // all answered – decide destination
      const allB = answers.every(a => a === 'B');
      setTimeout(() => {
        window.location.href = allB ? './03-rabbit-hole.html' : './05-lookagain.html';
      }, 600);
    }
  }, 900);
}

// start
showQuestion(0);
</script>
</body>
</html>
