<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ending</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .text {
      max-width: 720px;
      width: 88vw;
      white-space: pre-wrap;
      font-size: 1.3rem;
      line-height: 1.6;
    }
    .cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="text" id="text"></div>
  <script>
    const blocks = [
      { text: "Dear reader,", prePause: true },
      { text: "How did you end up here?" },
      { text: "You knew this wasn\u2019t the way.\nAnd still\u2026 you kept going." },
      { text: "I was wondering if you would." },
      { text: "Did it scare you?" },
      { text: "I told you it burns.\nYou wanted to feel it anyway." },
      {
        text: "You\u2019re getting closer.",
        replaceWith: "I\u2019ll do this again.",
        thinkBeforeDelete: true,
        longThink: true
      },
      { text: "Kiss,\nAnna" }
    ];

    const textEl = document.getElementById("text");
    let content = "";

    const settings = {
      min: 28,
      max: 60,
      punctuationPause: 140,
      paragraphPause: 800,
      thinkingPause: 1000,
      deepThinkingPause: 2800,
      deleteSpeed: 35,
      replacePause: 250
    };

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function render() {
      textEl.textContent = content;
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "\u258c";
      textEl.appendChild(cursor);
    }

    async function typeText(str) {
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        content += char;
        render();
        let delay = rand(settings.min, settings.max);
        if (",.!?\u2026".includes(char)) delay += settings.punctuationPause;
        if (char === "\n") delay += 80;
        await sleep(delay);
      }
    }

    async function deleteText(count) {
      for (let i = 0; i < count; i++) {
        content = content.slice(0, -1);
        render();
        await sleep(settings.deleteSpeed);
      }
    }

    async function run() {
      render();
      await sleep(settings.thinkingPause);

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];

        if (i !== 0) {
          content += "\n\n";
          render();
          await sleep(settings.paragraphPause);
        }

        if (block.prePause) {
          render();
          await sleep(settings.thinkingPause);
        }

        await typeText(block.text);

        if (block.replaceWith) {
          if (block.thinkBeforeDelete) {
            render();
            await sleep(block.longThink ? settings.deepThinkingPause : settings.thinkingPause);
          }
          await sleep(settings.replacePause);
          await deleteText(block.text.length);
          await sleep(600);
          await typeText(block.replaceWith);
        }

        if (block.postPause) {
          render();
          await sleep(settings.thinkingPause);
        }
      }

      render();
    }

    run();
  </script>
</body>
</html>
