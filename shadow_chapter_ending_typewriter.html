<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Chapter Ending</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #f2f2ee;
      --cursor: #f2f2ee;
      --max-width: 720px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .screen {
      width: min(var(--max-width), 88vw);
      min-height: 52vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 0;
    }

    .text-block {
      width: 100%;
      white-space: pre-wrap;
      font-size: clamp(1.08rem, 2vw, 1.35rem);
      line-height: 1.6;
      letter-spacing: 0.01em;
      word-break: break-word;
    }

    .cursor {
      display: inline-block;
      width: 0.58ch;
      margin-left: 0.04ch;
      color: var(--cursor);
      animation: blink 1s steps(1, end) infinite;
      vertical-align: baseline;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor {
        animation-duration: 1.6s;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-live="polite">
    <div class="text-block" id="text"></div>
  </main>

  <script>
    const paragraphs = [
      "Dear reader,",
      "Welcome to the other side.",
      "This didn’t scare you, did it?",
      "You took the wrong turn.\nYou knew it wasn’t the way.\nAnd you kept going.",
      "Why?",
      "Don’t act so surprised. I told you it burns. You didn’t wear the gloves.",
      "I will do this again.",
      "Kiss,\nAnna"
    ];

    const textEl = document.getElementById('text');

    const settings = {
      minTypeDelay: 28,
      maxTypeDelay: 62,
      punctuationPause: 140,
      paragraphPause: 900,
      finalPause: 0,
      initialPause: 900
    };

    let typed = '';

    function randomDelay(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function render() {
      textEl.textContent = typed;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '▌';
      textEl.appendChild(cursor);
    }

    async function typeParagraph(paragraph, isFirstParagraph) {
      if (!isFirstParagraph) {
        await sleep(settings.paragraphPause);
      }

      for (let i = 0; i < paragraph.length; i += 1) {
        const char = paragraph[i];
        typed += char;
        render();

        let delay = randomDelay(settings.minTypeDelay, settings.maxTypeDelay);
        if ([',', '.', '?', '!', ':', ';'].includes(char)) {
          delay += settings.punctuationPause;
        }
        if (char === '\n') {
          delay += 80;
        }
        await sleep(delay);
      }
    }

    async function startTyping() {
      // show blinking cursor before typing starts
      render();
      await sleep(settings.initialPause);

      for (let i = 0; i < paragraphs.length; i += 1) {
        if (i > 0) {
          typed += '

';
          render();
        }
        await typeParagraph(paragraphs[i], i === 0);
      }

      if (settings.finalPause > 0) {
        await sleep(settings.finalPause);
      }
      render();
    }
        await typeParagraph(paragraphs[i], i === 0);
      }

      if (settings.finalPause > 0) {
        await sleep(settings.finalPause);
      }
      render();
    }

    startTyping();
  </script>
</body>
</html>
