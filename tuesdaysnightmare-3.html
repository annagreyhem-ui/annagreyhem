<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; user-select:none; }

#room { position:fixed; inset:0; }
#room video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* light switch */
#switch {
  position:fixed;
  z-index:50;
  cursor:none;
  -webkit-tap-highlight-color:transparent;
  /* desktop default */
  left:28%; top:42%;
  transform:translate(-50%,-50%);
}

/* mobile override */
@media (hover:none) and (pointer:coarse) {
  #switch {
    left:15%; top:40%;
  }
  #graffiti {
    top:20%;
    width:48%;
    left:5%;
  }
}

#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%; pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
  transition:background 0.5s;
}
body.on #cursor { background:rgba(0,0,0,0.28); }

#graffiti {
  position:fixed;
  left:5%; top:28%;
  width:48%;
  z-index:40;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
  transform:rotate(-2deg);
  transform-origin:left center;
  mix-blend-mode:screen;
}
#graffiti.show { opacity:1; }

/* Mobile: full image overlay */
#graffiti-mobile {
  position:fixed;
  inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  z-index:40;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
  display:none;
}
#graffiti-mobile.show { opacity:1; }

@media (hover:none) and (pointer:coarse) {
  #graffiti { display:none; }
  #graffiti-mobile { display:block; }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <video id="vid" preload="auto" playsinline muted></video>
</div>

<img id="graffiti" src="./graffiti.png" alt="">
<img id="graffiti-mobile" src="./tuesdaysnightmare_graffiti_phone.jpg" alt="">

<div id="switch" onclick="toggle()">
  <svg width="28" height="52" viewBox="0 0 28 52">
    <rect x="1" y="1" width="26" height="50" rx="3"
      id="sw-bg" fill="#b8b4ac" stroke="#908c84" stroke-width="1"/>
    <rect x="7" y="6" width="14" height="20" rx="2"
      id="sw-tog" fill="#989490"/>
  </svg>
</div>

<script>
var isMobile = window.matchMedia('(hover:none) and (pointer:coarse)').matches;

// cursor
var cur = document.getElementById('cursor');
if (isMobile) {
  cur.style.display = 'none';
} else {
  document.addEventListener('mousemove', function(e) {
    cur.style.left = e.clientX+'px';
    cur.style.top  = e.clientY+'px';
  });
}

var vid      = document.getElementById('vid');
var flash    = document.getElementById('flash');
var graffiti       = document.getElementById('graffiti');
var graffitiMobile = document.getElementById('graffiti-mobile');

function showGraffiti(show) {
  if (show) {
    graffiti.classList.add('show');
    graffitiMobile.classList.add('show');
  } else {
    graffiti.classList.remove('show');
    graffitiMobile.classList.remove('show');
  }
}
var isOn     = false;
var busy     = false;
var DURATION = 2.894;
var clickCount = 0;
var rafId    = null;

// Set video source based on device
vid.src = isMobile ? './tuesdaysnightmare_phone.mp4' : './room.mp4';

// iOS requires play() from a user gesture before seeking works
var unlocked = false;

function ensureUnlocked(cb) {
  if (unlocked) { cb(); return; }
  var p = vid.play();
  if (p && p.then) {
    p.then(function() {
      vid.pause();
      vid.currentTime = 0;
      unlocked = true;
      cb();
    }).catch(function() {
      vid.currentTime = 0;
      unlocked = true;
      cb();
    });
  } else {
    vid.pause();
    vid.currentTime = 0;
    unlocked = true;
    cb();
  }
}

// Desktop: park on first frame once loaded
if (!isMobile) {
  vid.addEventListener('loadeddata', function() {
    vid.currentTime = 0;
  });
}

// Mobile: unlock on first touch, then park on frame 0
if (isMobile) {
  document.addEventListener('touchstart', function() {
    ensureUnlocked(function() {});
  }, { once: true, passive: true });
}

function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.45';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.25s ease';
    flash.style.opacity = '0';
  }, 40);
}

function updateSwitch() {
  var bg  = document.getElementById('sw-bg');
  var tog = document.getElementById('sw-tog');
  if (isOn) {
    bg.setAttribute('fill','#f0ece4');
    bg.setAttribute('stroke','#c8c0b0');
    tog.setAttribute('fill','#d0c8b8');
    tog.setAttribute('y','26');
  } else {
    bg.setAttribute('fill','#b8b4ac');
    bg.setAttribute('stroke','#908c84');
    tog.setAttribute('fill','#989490');
    tog.setAttribute('y','6');
  }
}

var SPEED_ON  = 2.894;
var SPEED_OFF = 8.0;

function runAnimation() {
  var startTime    = null;
  var startVidTime = isOn ? 0 : DURATION;
  var direction    = isOn ? 1 : -1;
  var speed        = isOn ? SPEED_ON : SPEED_OFF;

  vid.currentTime = startVidTime;

  function step(ts) {
    if (!startTime) startTime = ts;
    var elapsed = (ts - startTime) / 1000;
    var newTime = startVidTime + direction * elapsed * speed;
    newTime = Math.max(0, Math.min(DURATION, newTime));
    vid.currentTime = newTime;

    if ((direction > 0 && newTime >= DURATION) || (direction < 0 && newTime <= 0)) {
      vid.currentTime = direction > 0 ? DURATION : 0;
      rafId = null;
      busy  = false;
      return;
    }
    rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

function toggle() {
  function doToggle() {
    if (busy) return;
    busy = true;
    doFlash();

    isOn = !isOn;
    document.body.classList.toggle('on', isOn);
    updateSwitch();
    clickCount++;

    if (!isOn && clickCount % 4 === 0) {
      showGraffiti(true);
    } else {
      showGraffiti(false);
    }

    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    vid.pause();
    runAnimation();
  }

  if (isMobile && !unlocked) {
    ensureUnlocked(doToggle);
  } else {
    doToggle();
  }
}

document.getElementById('switch').addEventListener('touchend', function(e) {
  e.preventDefault();
  toggle();
}, { passive: false });
</script>
</body>
</html>
