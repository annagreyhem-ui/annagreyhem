<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  cursor:none;
  user-select:none;
}

#room { position:fixed; inset:0; }

#room video {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:100%; height:100%;
  object-fit:cover;
}

#vid-dark  { opacity:1; z-index:1; transition:opacity 0.12s ease; }
#vid-light { opacity:0; z-index:2; transition:opacity 0.12s ease; }

body.on #vid-dark  { opacity:0; }
body.on #vid-light { opacity:1; }

/* Graffiti */
#graffiti {
  position:fixed;
  z-index:40;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s ease;
  left:50%;
  top:38%;
  transform:translate(-50%,-50%);
  width:clamp(260px,40vw,480px);
  rotate:-2deg;
  -webkit-mask-image:radial-gradient(ellipse 85% 70% at 50% 50%, black 55%, transparent 100%);
  mask-image:radial-gradient(ellipse 85% 70% at 50% 50%, black 55%, transparent 100%);
}
#graffiti img { width:100%; }

/* Flash */
#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

/* Switch – desktop: left wall area */
#switch-desktop {
  position:fixed;
  left:27.5%; top:38%;
  transform:translate(-50%,-50%);
  z-index:50; cursor:none;
}
#switch-desktop:hover .switch-plate { opacity:0.85; }

/* Switch – mobile */
#switch-mobile {
  position:fixed;
  left:15%; top:45%;
  transform:translate(-50%,-50%);
  z-index:50;
  -webkit-tap-highlight-color:transparent;
  display:none;
}

@media (hover:hover) and (pointer:fine) {
  #switch-desktop { display:block; }
  #switch-mobile  { display:none; }
}
@media (hover:none) and (pointer:coarse) {
  #switch-desktop { display:none; }
  #switch-mobile  { display:block; }
}

.switch-plate {
  opacity:0.65;
  transition:opacity 0.2s;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));
}
body.on .switch-plate {
  opacity:0.75;
}
.switch-toggle {
  transition:transform 0.12s ease;
}
body.on .switch-toggle {
  transform:translateY(6px);
}

@media (hover:hover) and (pointer:fine) {
  #switch-desktop { display:block; }
  #switch-mobile  { display:none; }
}
@media (hover:none) and (pointer:coarse) {
  #switch-desktop { display:none; }
  #switch-mobile  { display:block; }
}

/* Cursor (desktop only) */
#cursor {
  position:fixed;
  width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:background 0.4s;
}
body.on #cursor { background:rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <video id="vid-dark"  muted playsinline preload="auto"></video>
  <video id="vid-light" muted playsinline preload="auto"></video>
</div>

<div id="graffiti"><img src="./graffiti.png" alt=""></div>

<div id="switch-desktop" onclick="handleSwitch()">
  <svg class="switch-plate" width="36" height="58" viewBox="0 0 36 58">
    <!-- plate -->
    <rect x="1" y="1" width="34" height="56" rx="3" ry="3"
      fill="#e8e4dc" stroke="#b0a898" stroke-width="1"/>
    <!-- rocker toggle -->
    <rect class="switch-toggle" x="9" y="10" width="18" height="24" rx="2" ry="2"
      fill="#c8c4bc" stroke="#a09890" stroke-width="0.8"/>
    <!-- subtle shadow line -->
    <line x1="9" y1="22" x2="27" y2="22" stroke="#909088" stroke-width="0.5" opacity="0.5"/>
  </svg>
</div>

<div id="switch-mobile" ontouchend="function(e){e.preventDefault();handleSwitch();}">
  <svg class="switch-plate" width="36" height="58" viewBox="0 0 36 58">
    <rect x="1" y="1" width="34" height="56" rx="3" ry="3"
      fill="#e8e4dc" stroke="#b0a898" stroke-width="1"/>
    <rect class="switch-toggle" x="9" y="10" width="18" height="24" rx="2" ry="2"
      fill="#c8c4bc" stroke="#a09890" stroke-width="0.8"/>
    <line x1="9" y1="22" x2="27" y2="22" stroke="#909088" stroke-width="0.5" opacity="0.5"/>
  </svg>
</div>

<script>
var isMobile = window.matchMedia('(hover:none) and (pointer:coarse)').matches;

var vidDark  = document.getElementById('vid-dark');
var vidLight = document.getElementById('vid-light');
var src = isMobile ? './tuesdaysnightmare_phone.mp4' : './room.mp4';

vidDark.src  = src;
vidLight.src = src;

// iOS requires a user gesture to unlock video
// We play+pause on first touch to unlock, then seek to correct frames
var videosUnlocked = false;

function unlockVideos(cb) {
  if (videosUnlocked) { if (cb) cb(); return; }
  var p1 = vidDark.play();
  var p2 = vidLight.play();
  Promise.all([
    p1 ? p1.catch(function(){}) : Promise.resolve(),
    p2 ? p2.catch(function(){}) : Promise.resolve()
  ]).then(function() {
    vidDark.pause();
    vidLight.pause();
    videosUnlocked = true;
    seekToFrames(cb);
  });
}

function seekToFrames(cb) {
  var loaded = 0;
  function done() { loaded++; if (loaded === 2 && cb) cb(); }

  vidDark.currentTime = 0;
  vidDark.addEventListener('seeked', function h() {
    vidDark.removeEventListener('seeked', h); done();
  });

  // seek light to end once duration is known
  function seekLight() {
    if (vidLight.duration && isFinite(vidLight.duration)) {
      vidLight.currentTime = vidLight.duration - 0.01;
      vidLight.addEventListener('seeked', function h() {
        vidLight.removeEventListener('seeked', h); done();
      });
    } else {
      vidLight.addEventListener('loadedmetadata', function h() {
        vidLight.removeEventListener('loadedmetadata', h);
        vidLight.currentTime = vidLight.duration - 0.01;
        vidLight.addEventListener('seeked', function h2() {
          vidLight.removeEventListener('seeked', h2); done();
        });
      });
    }
  }
  seekLight();
}

// Desktop: seek on metadata load
if (!isMobile) {
  vidDark.addEventListener('loadedmetadata', function() { vidDark.currentTime = 0; });
  vidLight.addEventListener('loadedmetadata', function() {
    vidLight.currentTime = vidLight.duration - 0.01;
  });
}

// Mobile: unlock on first touch anywhere
if (isMobile) {
  document.addEventListener('touchstart', function() {
    unlockVideos();
  }, {once: true, passive: true});
}

// Cursor
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
if (isMobile) cur.style.display = 'none';

// State
var isOn = false;
var clicks = 0;
var graffiti = document.getElementById('graffiti');
var flash    = document.getElementById('flash');

function doFlash() {
  flash.style.transition = 'opacity 0.03s';
  flash.style.opacity = '0.65';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.2s';
    flash.style.opacity = '0';
  }, 40);
}

function checkGraffiti() {
  clicks++;
  if (clicks % 4 === 0 && !isOn) {
    graffiti.style.opacity = '1';
    setTimeout(function() { graffiti.style.opacity = '0'; }, 1800);
  }
}

function handleSwitch() {
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);
  checkGraffiti();
}

document.getElementById('switch-desktop').addEventListener('click', handleSwitch);
document.getElementById('switch-mobile').addEventListener('touchend', function(e) {
  e.preventDefault();
  handleSwitch();
}, {passive:false});
</script>
</body>
</html>
