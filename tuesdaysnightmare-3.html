<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  cursor:none;
  user-select:none;
}

#room { position:fixed; inset:0; }

#room video {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:100%; height:100%;
  object-fit:cover;
}

#vid-dark  { opacity:1; z-index:1; transition:opacity 0.12s ease; }
#vid-light { opacity:0; z-index:2; transition:opacity 0.12s ease; }

body.on #vid-dark  { opacity:0; }
body.on #vid-light { opacity:1; }

/* Graffiti */
#graffiti {
  position:fixed;
  z-index:40;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s ease;
  left:50%;
  top:38%;
  transform:translate(-50%,-50%);
  width:clamp(260px,40vw,480px);
  rotate:-2deg;
  -webkit-mask-image:radial-gradient(ellipse 85% 70% at 50% 50%, black 55%, transparent 100%);
  mask-image:radial-gradient(ellipse 85% 70% at 50% 50%, black 55%, transparent 100%);
}
#graffiti img { width:100%; }

/* Flash */
#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

/* Switch – desktop */
#switch-desktop {
  position:fixed;
  left:27.5%; top:53%;
  transform:translate(-50%,-50%);
  z-index:50; cursor:none;
  width:54px; height:54px;
}
#switch-desktop-hit {
  width:54px; height:54px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,0);
  transition:border-color 0.2s;
}
#switch-desktop:hover #switch-desktop-hit { border-color:rgba(255,255,255,0.3); }
body.on #switch-desktop:hover #switch-desktop-hit { border-color:rgba(0,0,0,0.2); }

/* Switch – mobile */
#switch-mobile {
  position:fixed;
  left:15%; top:55%;
  transform:translate(-50%,-50%);
  z-index:50;
  width:70px; height:70px;
  -webkit-tap-highlight-color:transparent;
  display:none;
}
#switch-mobile-hit {
  width:70px; height:70px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,0);
}

@media (hover:hover) and (pointer:fine) {
  #switch-desktop { display:block; }
  #switch-mobile  { display:none; }
}
@media (hover:none) and (pointer:coarse) {
  #switch-desktop { display:none; }
  #switch-mobile  { display:block; }
}

/* Cursor (desktop only) */
#cursor {
  position:fixed;
  width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:background 0.4s;
}
body.on #cursor { background:rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <video id="vid-dark"  muted playsinline preload="auto"></video>
  <video id="vid-light" muted playsinline preload="auto"></video>
</div>

<div id="graffiti"><img src="./graffiti.png" alt=""></div>

<div id="switch-desktop"><div id="switch-desktop-hit"></div></div>
<div id="switch-mobile"><div id="switch-mobile-hit"></div></div>

<script>
var isMobile = window.matchMedia('(hover:none) and (pointer:coarse)').matches;

var vidDark  = document.getElementById('vid-dark');
var vidLight = document.getElementById('vid-light');
var src = isMobile ? './tuesdaysnightmare_phone.mp4' : './room.mp4';

vidDark.src  = src;
vidLight.src = src;

// Init: dark paused at frame 0, light paused at last frame
vidDark.addEventListener('loadedmetadata', function() {
  vidDark.currentTime = 0;
});
vidLight.addEventListener('loadedmetadata', function() {
  vidLight.currentTime = vidLight.duration;
});

// Cursor
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
if (isMobile) cur.style.display = 'none';

// State
var isOn = false;
var clicks = 0;
var graffiti = document.getElementById('graffiti');
var flash    = document.getElementById('flash');

function doFlash() {
  flash.style.transition = 'opacity 0.03s';
  flash.style.opacity = '0.65';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.2s';
    flash.style.opacity = '0';
  }, 40);
}

function checkGraffiti() {
  clicks++;
  if (clicks % 4 === 0 && !isOn) {
    graffiti.style.opacity = '1';
    setTimeout(function() { graffiti.style.opacity = '0'; }, 1800);
  }
}

function handleSwitch() {
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);
  checkGraffiti();
}

document.getElementById('switch-desktop').addEventListener('click', handleSwitch);
document.getElementById('switch-mobile').addEventListener('touchend', function(e) {
  e.preventDefault();
  handleSwitch();
}, {passive:false});
</script>
</body>
</html>
