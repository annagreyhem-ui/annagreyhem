<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:100vw; height:100vh; overflow:hidden; cursor:none; }

.cursor {
  position:fixed; width:8px; height:8px; background:white;
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
}

#scene1 {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:50px;
}

#rabbit-svg {
  width:144px; height:144px;
  animation: hop 0.6s ease-in-out infinite alternate;
  transform-origin: bottom center;
}
@keyframes hop {
  0%   { transform: translateY(0px)   scaleY(1)    scaleX(1); }
  30%  { transform: translateY(0px)   scaleY(0.85) scaleX(1.1); }
  60%  { transform: translateY(-18px) scaleY(1.1)  scaleX(0.95); }
  100% { transform: translateY(-22px) scaleY(1.05) scaleX(0.97); }
}
#ear-left  { animation: wiggle-l 1.2s ease-in-out infinite; transform-origin:bottom center; }
#ear-right { animation: wiggle-r 1.2s ease-in-out infinite; transform-origin:bottom center; }
@keyframes wiggle-l { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(4deg)} }
@keyframes wiggle-r { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(8deg)} 75%{transform:rotate(-4deg)} }

#hole-wrap { opacity:0; transition:opacity 0.8s; }
#hole-wrap.visible { opacity:1; }

#hole {
  width:180px; height:55px;
  background: radial-gradient(ellipse at 50% 60%, #1a1a1a 0%, #000 80%);
  border-radius:50%;
  border: 2px solid #222;
  box-shadow: 0 0 30px rgba(0,0,0,1), inset 0 6px 18px rgba(0,0,0,0.95);
  cursor:pointer;
  transform:scaleX(0);
  transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
}
#hole.open { transform:scaleX(1); }
#hole:hover {
  box-shadow: 0 0 40px rgba(255,255,255,0.08), 0 0 0 3px #333,
              inset 0 6px 18px rgba(0,0,0,0.95);
}

#tagline {
  position:fixed; bottom:60px; left:50%;
  transform:translateX(-50%);
  font-family:'IM Fell English',serif;
  font-size:clamp(16px,2.2vw,26px);
  color:white; letter-spacing:0.15em;
  font-style:italic; opacity:0;
  white-space:nowrap; pointer-events:none;
  z-index:50;
}

/* ── FALL SCREEN ── */
#fall-screen {
  position:fixed; inset:0; background:#000;
  z-index:200; display:none; overflow:hidden;
}
#tunnel {
  position:absolute; left:50%; top:0;
  transform:translateX(-50%);
  width:220px; height:100%; background:#000;
}
.tunnel-wall-l {
  position:absolute; top:0; right:100%;
  width:50vw; height:100%; background:#000;
}
.tunnel-wall-r {
  position:absolute; top:0; left:100%;
  width:50vw; height:100%; background:#000;
}
.ring {
  position:absolute; left:50%;
  transform:translateX(-50%);
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  animation:ring-zoom linear infinite;
}
@keyframes ring-zoom {
  0%  { opacity:0; width:40px;  height:14px; margin-top:0; }
  20% { opacity:0.5; }
  80% { opacity:0.2; }
  100%{ opacity:0; width:600px; height:200px; margin-top:-93px; }
}
#falling-rabbit {
  position:absolute; left:50%; top:-160px;
  transform:translateX(-50%);
  width:80px; height:96px;
  animation:fall-rabbit 5s ease-in forwards;
  z-index:10;
}
@keyframes fall-rabbit {
  0%  { top:-160px; transform:translateX(-50%) rotate(0deg) scale(1); }
  20% { transform:translateX(-58%) rotate(20deg) scale(0.95); }
  40% { transform:translateX(-42%) rotate(-15deg) scale(0.9); }
  60% { transform:translateX(-54%) rotate(10deg) scale(0.8); }
  80% { transform:translateX(-46%) rotate(-8deg) scale(0.65); }
  100%{ top:110%; transform:translateX(-50%) rotate(5deg) scale(0.4); }
}
.glitter {
  position:absolute; border-radius:50%;
  pointer-events:none;
  animation:glitter-fall linear forwards;
  z-index:10;
}
@keyframes glitter-fall {
  0%  { opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
  40% { opacity:0.9; }
  100%{ opacity:0; transform:translateY(100vh) scale(0.2) rotate(900deg); }
}
#fall-screen::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 50% 100% at 50% 50%, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events:none; z-index:5;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div id="scene1">
  <svg id="rabbit-svg" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="85" rx="22" ry="26" fill="white"/>
    <ellipse cx="50" cy="55" rx="18" ry="16" fill="white"/>
    <g id="ear-left">
      <ellipse cx="38" cy="28" rx="6" ry="18" fill="white" transform="rotate(-8 38 42)"/>
      <ellipse cx="38" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(-8 38 42)"/>
    </g>
    <g id="ear-right">
      <ellipse cx="62" cy="28" rx="6" ry="18" fill="white" transform="rotate(8 62 42)"/>
      <ellipse cx="62" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(8 62 42)"/>
    </g>
    <circle cx="43" cy="52" r="2.5" fill="#111"/>
    <circle cx="43.8" cy="51.2" r="0.8" fill="white"/>
    <circle cx="57" cy="52" r="2.5" fill="#111"/>
    <circle cx="57.8" cy="51.2" r="0.8" fill="white"/>
    <ellipse cx="50" cy="60" rx="2" ry="1.2" fill="#ffb6c1"/>
    <line x1="18" y1="58" x2="40" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="18" y1="62" x2="40" y2="61" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="82" y1="58" x2="60" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="82" y1="62" x2="60" y2="61" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <circle cx="71" cy="90" r="7" fill="white"/>
    <ellipse cx="36" cy="105" rx="7" ry="5" fill="white"/>
    <ellipse cx="64" cy="105" rx="7" ry="5" fill="white"/>
  </svg>

  <div id="hole-wrap">
    <div id="hole" onclick="startFall()"></div>
  </div>
</div>

<div id="tagline">Follow the white rabbit.</div>

<div id="fall-screen">
  <div id="tunnel">
    <div class="tunnel-wall-l"></div>
    <div class="tunnel-wall-r"></div>
  </div>
  <div id="falling-rabbit">
    <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="85" rx="22" ry="26" fill="white"/>
      <ellipse cx="50" cy="55" rx="18" ry="16" fill="white"/>
      <ellipse cx="38" cy="28" rx="6" ry="18" fill="white" transform="rotate(-8 38 42)"/>
      <ellipse cx="38" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(-8 38 42)"/>
      <ellipse cx="62" cy="28" rx="6" ry="18" fill="white" transform="rotate(8 62 42)"/>
      <ellipse cx="62" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(8 62 42)"/>
      <circle cx="43" cy="52" r="2.5" fill="#111"/>
      <circle cx="57" cy="52" r="2.5" fill="#111"/>
      <ellipse cx="50" cy="60" rx="2" ry="1.2" fill="#ffb6c1"/>
      <line x1="18" y1="58" x2="40" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
      <line x1="82" y1="58" x2="60" y2="59" stroke="white" stroke-width="0.8" opacity="0.5"/>
      <circle cx="71" cy="90" r="7" fill="white"/>
      <ellipse cx="36" cy="105" rx="7" ry="5" fill="white"/>
      <ellipse cx="64" cy="105" rx="7" ry="5" fill="white"/>
    </svg>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

const rabbitSvg = document.getElementById('rabbit-svg');
const holeWrap  = document.getElementById('hole-wrap');
const hole      = document.getElementById('hole');
const tagline   = document.getElementById('tagline');

// 2s: hole opens
setTimeout(() => {
  holeWrap.classList.add('visible');
  setTimeout(() => hole.classList.add('open'), 100);
}, 2000);

// 4s: rabbit starts falling into hole
setTimeout(() => {
  rabbitSvg.style.animation = 'none';
  rabbitSvg.style.transition = 'transform 1s ease-in, opacity 0.8s ease-in';
  rabbitSvg.style.transform  = 'translateY(40px) scaleY(0.7) scaleX(1.15)';

  // tagline flickers in simultaneously
  flickerIn(tagline);

  setTimeout(() => {
    rabbitSvg.style.transform = 'translateY(130px) scaleY(0.1) scaleX(0.5)';
    rabbitSvg.style.opacity   = '0';
  }, 800);

}, 4000);

function flickerIn(el) {
  const steps = [
    [0,   0.9],
    [150, 0.0],
    [350, 0.8],
    [500, 0.0],
    [800, 0.7],
    [1050,0.0],
    [1300,0.85],
    [1600,0.15],
    [2000,0.9],
    [2400,0.3],
    [2900,1.0],
  ];
  steps.forEach(([delay, val]) => {
    setTimeout(() => el.style.opacity = val, delay);
  });
}

// auto-start fall after 9s if user doesnt click
setTimeout(() => { if(document.getElementById("fall-screen").style.display !== "block") startFall(); }, 9000);

function startFall() {
  const fallScreen = document.getElementById('fall-screen');
  fallScreen.style.display = 'block';

  const tunnel = document.getElementById('tunnel');

  for (let i = 0; i < 20; i++) {
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.cssText = `
      top:${20 + Math.random()*50}%;
      animation-duration:${1.0 + Math.random()*0.9}s;
      animation-delay:${i * 0.25}s;
    `;
    tunnel.appendChild(ring);
  }

  const colors = ['#fff','#ffd700','#ff69b4','#c8a2c8','#add8e6','#fffacd','#e0b0ff'];
  for (let i = 0; i < 90; i++) {
    const g = document.createElement('div');
    g.className = 'glitter';
    const size = 2 + Math.random() * 9;
    g.style.cssText = `
      left:${28 + Math.random()*44}%;
      top:${-5 + Math.random()*15}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:${0.6+Math.random()*0.4};
      animation-duration:${2 + Math.random()*3}s;
      animation-delay:${Math.random()*3.5}s;
    `;
    fallScreen.appendChild(g);
  }

  setTimeout(() => {
    window.location.href = './04-shadow.html';
  }, 5000);
}
</script>
</body>
</html>
