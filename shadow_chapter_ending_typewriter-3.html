<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ending</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .text {
      max-width: 720px;
      width: 88vw;
      white-space: pre-wrap;
      font-size: 1.3rem;
      line-height: 1.6;
    }

    .cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="text" id="text"></div>

  <script>
    const blocks = [
      { text: "Dear reader,", prePause: true },

      { text: "Welcome to the other side." },

      { text: "This didn’t scare you, did it?" },

      { text: "You took the wrong turn.\nYou knew it wasn’t the way.\nAnd you kept going." },

      { text: "Why?" },

      { text: "Don’t act so surprised. I told you it burns. You didn’t wear the gloves." },

      // 👇 HIER geändert (zusammengelegt)
      { text: "Oh, and...\nI will do this again.", postPause: true },

      { text: "Kiss,\nAnna" }
    ];

    const textEl = document.getElementById("text");

    let content = "";

    const settings = {
      min: 28,
      max: 60,
      punctuationPause: 140,
      paragraphPause: 800,
      thinkingPause: 1000
    };

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function render() {
      textEl.textContent = content;

      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "▌";

      textEl.appendChild(cursor);
    }

    async function typeText(str) {
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        content += char;
        render();

        let delay = rand(settings.min, settings.max);

        if (",.!?…".includes(char)) delay += settings.punctuationPause;
        if (char === "\n") delay += 80;

        await sleep(delay);
      }
    }

    async function run() {
      render();
      await sleep(settings.thinkingPause);

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];

        if (i !== 0) {
          content += "\n\n";
          render();
          await sleep(settings.paragraphPause);
        }

        if (block.prePause) {
          render();
          await sleep(settings.thinkingPause);
        }

        await typeText(block.text);

        if (block.postPause) {
          render();
          await sleep(settings.thinkingPause);
        }
      }

      render();
    }

    run();
  </script>
</body>
</html>
