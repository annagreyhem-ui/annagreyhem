<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-bottom: 1px solid #1a1a1a;
  }

  #topbar span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0.35em;
    color: #fff;
    font-weight: 400;
  }

  /* ── CASTLE WRAPPER ── */
  #castle-wrapper {
    position: fixed;
    top: 44px;
    left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  #castle-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    user-select: none;
    pointer-events: none;
  }

  /* ── HOTSPOTS ── */
  .hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    border: none;
    transition: background 0.25s ease;
    border-radius: 3px;
    z-index: 10;
  }

  .hotspot:hover {
    background: rgba(120, 0, 0, 0.13);
    outline: 1px solid rgba(180, 0, 0, 0.25);
  }

  .hotspot .label {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0);
    transition: color 0.25s ease;
    pointer-events: none;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  }

  .hotspot:hover .label {
    color: rgba(255, 255, 255, 0.75);
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  #overlay.active {
    display: flex;
  }

  #room-panel {
    position: relative;
    max-width: 860px;
    width: 88vw;
    animation: fadeUp 0.35s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #room-image-wrap img {
    width: 100%;
    max-height: 62vh;
    object-fit: cover;
    display: block;
    filter: brightness(0.9);
  }

  .room-placeholder {
    width: 100%;
    height: 360px;
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .room-placeholder .ph-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    letter-spacing: 0.3em;
    color: #222;
  }

  .room-placeholder .ph-sub {
    font-size: 12px;
    letter-spacing: 0.22em;
    color: #161616;
    font-style: italic;
  }

  #room-info {
    background: #000;
    padding: 18px 26px 22px;
    border-top: 1px solid #181818;
  }

  #room-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.22em;
    color: #fff;
    margin-bottom: 7px;
  }

  #room-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: #555;
    font-style: italic;
    letter-spacing: 0.06em;
    line-height: 1.75;
  }

  #close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 16px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    border-radius: 2px;
  }

  #close-btn:hover { color: #fff; border-color: #555; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span>Anna Greyhem</span>
</div>

<!-- CASTLE -->
<div id="castle-wrapper">
  <img id="castle-img" src="castle.png" alt="Anna Greyhem's Castle" draggable="false" />

  <!-- THE BEDROOM — top left tower, red curtains, spinning wheel -->
  <div class="hotspot" style="left:2%; top:2%; width:21%; height:46%;"
       onclick="openRoom('bedroom')">
    <span class="label">The Bedroom</span>
  </div>

  <!-- THE LIBRARY — second floor left, bookshelves + desk -->
  <div class="hotspot" style="left:2%; top:50%; width:26%; height:26%;"
       onclick="openRoom('library')">
    <span class="label">The Library</span>
  </div>

  <!-- THE DRAWING ROOM — ground floor left, fireplace + portrait + red chair -->
  <div class="hotspot" style="left:2%; top:77%; width:26%; height:22%;"
       onclick="openRoom('drawing')">
    <span class="label">The Drawing Room</span>
  </div>

  <!-- THE CHILDREN'S ROOM — top right, drawings everywhere + rabbit toy -->
  <div class="hotspot" style="left:54%; top:2%; width:26%; height:44%;"
       onclick="openRoom('children')">
    <span class="label">The Children's Room</span>
  </div>

  <!-- THE CORRIDOR — middle right, staircase + torches -->
  <div class="hotspot" style="left:54%; top:48%; width:26%; height:27%;"
       onclick="openRoom('corridor')">
    <span class="label">The Corridor</span>
  </div>

  <!-- THE APOTHECARY — ground floor right, globe + bottles + candles -->
  <div class="hotspot" style="left:54%; top:77%; width:26%; height:22%;"
       onclick="openRoom('apothecary')">
    <span class="label">The Apothecary</span>
  </div>

</div>

<!-- OVERLAY -->
<div id="overlay" onclick="handleOverlayClick(event)">
  <div id="room-panel">
    <button id="close-btn" onclick="closeRoom()">✕</button>
    <div id="room-image-wrap"></div>
    <div id="room-info">
      <div id="room-name"></div>
      <div id="room-desc"></div>
    </div>
  </div>
</div>

<script>
const rooms = {
  bedroom: {
    name: "The Bedroom",
    desc: "She was beautiful, frozen, waiting.",
    img: "rooms/bedroom.png"
  },
  library: {
    name: "The Library",
    desc: "She left the book open. She always does.",
    img: "rooms/library.png"
  },
  drawing: {
    name: "The Drawing Room",
    desc: "She set the table for twelve. No one came. She wasn't surprised.",
    img: "rooms/drawing.png"
  },
  children: {
    name: "The Children's Room",
    desc: "Every wall a memory. Every painting a door that never opened.",
    img: "rooms/children.png"
  },
  corridor: {
    name: "The Corridor",
    desc: "Somewhere in here, a staircase leads somewhere it shouldn't.",
    img: "rooms/corridor.png"
  },
  apothecary: {
    name: "The Apothecary",
    desc: "Not everything in those bottles has a name.",
    img: "rooms/apothecary.png"
  }
};

function openRoom(id) {
  const room = rooms[id];
  document.getElementById('room-name').textContent = room.name;
  document.getElementById('room-desc').textContent = room.desc;

  const wrap = document.getElementById('room-image-wrap');
  wrap.innerHTML = '';

  const img = new Image();
  img.onload = () => {
    img.style.cssText = 'width:100%;max-height:62vh;object-fit:cover;display:block;filter:brightness(0.9);';
    wrap.appendChild(img);
  };
  img.onerror = () => {
    wrap.innerHTML = `
      <div class="room-placeholder">
        <div class="ph-title">${room.name}</div>
        <div class="ph-sub">coming soon.</div>
      </div>`;
  };
  img.src = room.img;

  document.getElementById('overlay').classList.add('active');
}

function closeRoom() {
  document.getElementById('overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeRoom();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRoom();
});
</script>
</body>
</html>
