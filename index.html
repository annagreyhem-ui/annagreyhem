<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Greyhem</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  #tagline {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(17px, 2.2vw, 22px);
    color: white;
    letter-spacing: 0.2em;
    font-style: italic;
    opacity: 0;
    white-space: nowrap;
  }

  #rabbit-container {
    position: fixed;
    bottom: 24px;
    right: 32px;
    cursor: pointer;
    z-index: 100;
  }

  #rabbit-container:hover #rabbit-svg {
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
  }

  #rabbit-svg {
    width: 72px;
    height: 72px;
    animation: hop 0.6s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }

  @keyframes hop {
    0% {
      transform: translateY(0px) scaleY(1) scaleX(1);
    }
    30% {
      transform: translateY(0px) scaleY(0.85) scaleX(1.1);
    }
    60% {
      transform: translateY(-10px) scaleY(1.1) scaleX(0.95);
    }
    100% {
      transform: translateY(-14px) scaleY(1.05) scaleX(0.97);
    }
  }

  #ear-left {
    animation: wiggle-left 1.2s ease-in-out infinite;
    transform-origin: bottom center;
  }

  #ear-right {
    animation: wiggle-right 1.2s ease-in-out infinite;
    transform-origin: bottom center;
  }

  @keyframes wiggle-left {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-4deg); }
    75% { transform: rotate(2deg); }
  }

  @keyframes wiggle-right {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(4deg); }
    75% { transform: rotate(-2deg); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div id="tagline">Follow the white rabbit.</div>

<div id="rabbit-container" onclick="window.location.href='./02-questions.html'" title="Follow the white rabbit">
  <svg id="rabbit-svg" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="50" cy="85" rx="22" ry="26" fill="white"/>
    <!-- Head -->
    <ellipse cx="50" cy="55" rx="18" ry="16" fill="white"/>
    <!-- Left ear -->
    <g id="ear-left">
      <ellipse cx="38" cy="28" rx="6" ry="18" fill="white" transform="rotate(-8 38 42)"/>
      <ellipse cx="38" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(-8 38 42)"/>
    </g>
    <!-- Right ear -->
    <g id="ear-right">
      <ellipse cx="62" cy="28" rx="6" ry="18" fill="white" transform="rotate(8 62 42)"/>
      <ellipse cx="62" cy="28" rx="3" ry="13" fill="#ffb6c1" opacity="0.6" transform="rotate(8 62 42)"/>
    </g>
    <!-- Eye left -->
    <circle cx="43" cy="52" r="2.5" fill="#111"/>
    <circle cx="43.8" cy="51.2" r="0.8" fill="white"/>
    <!-- Eye right -->
    <circle cx="57" cy="52" r="2.5" fill="#111"/>
    <circle cx="57.8" cy="51.2" r="0.8" fill="white"/>
    <!-- Nose -->
    <ellipse cx="50" cy="60" rx="2" ry="1.2" fill="#ffb6c1"/>
    <!-- Tail -->
    <circle cx="71" cy="90" r="7" fill="white"/>
    <!-- Left front paw -->
    <ellipse cx="36" cy="105" rx="7" ry="5" fill="white"/>
    <!-- Right front paw -->
    <ellipse cx="64" cy="105" rx="7" ry="5" fill="white"/>
  </svg>
</div>

<script>
  const cursor = document.getElementById('cursor');
  let cursorHideTimer = null;
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursor.style.opacity = '1';
    clearTimeout(cursorHideTimer);
    cursorHideTimer = setTimeout(() => cursor.style.opacity = '0', 2000);
  });
  document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
  document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

  // --- Flicker engine: chaos → candle ---
  const tagline = document.getElementById('tagline');
  let killFlashDone = false;

  function rand(min, max) { return min + Math.random() * (max - min); }

  function nextFlicker(startTime) {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(1, elapsed / 3000);

    if (elapsed > 3000) {
      tagline.textContent = 'Follow the white rabbit.';
      tagline.style.opacity = 1;
      return;
    }

    if (progress < 0.33) {
      if (!killFlashDone && elapsed > 600 && Math.random() < 0.15) {
        killFlashDone = true;
        tagline.textContent = 'Kill the white rabbit.';
        tagline.style.opacity = rand(0.8, 1.0);
        setTimeout(() => {
          tagline.textContent = 'Follow the white rabbit.';
          tagline.style.opacity = rand(0, 0.04);
          setTimeout(() => nextFlicker(startTime), rand(25, 80));
        }, rand(80, 150));
        return;
      }
      tagline.style.opacity = Math.random() > 0.45 ? rand(0.7, 1.0) : rand(0, 0.04);
      setTimeout(() => nextFlicker(startTime), rand(25, 100));
    } else if (progress < 0.5) {
      tagline.style.opacity = Math.random() > 0.25 ? rand(0.5, 0.9) : rand(0, 0.18);
      setTimeout(() => nextFlicker(startTime), rand(60, 220));
    } else {
      tagline.style.opacity = rand(0.72, 1.0);
      setTimeout(() => nextFlicker(startTime), rand(120, 380));
    }
  }

  setTimeout(() => {
    const startTime = Date.now();
    nextFlicker(startTime);
  }, 1500);
</script>

</body>
</html>
