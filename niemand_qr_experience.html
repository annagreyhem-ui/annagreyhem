<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niemand — QR Experience</title>
  <style>
    :root {
      --bg: #000;
      --fg: #f3f3f3;
      --muted: #9a9a9a;
      --line-height: 1.45;
      --hold-duration: 2200ms;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 700ms ease;
    }

    .wrap {
      width: min(680px, 88vw);
      min-height: 42vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem;
      position: relative;
    }

    .text {
      font-size: clamp(1.15rem, 2.8vw, 1.55rem);
      line-height: var(--line-height);
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 700ms ease, transform 700ms ease, filter 700ms ease, font-size 240ms ease;
      max-width: 26ch;
      user-select: none;
      filter: blur(0px);
      white-space: nowrap;
    }

    .highlight-red {
      color: #ff3b3b;
    }
    }

    .text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .instruction {
      position: fixed;
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      opacity: 0;
      transition: opacity 500ms ease;
      user-select: none;
      text-align: center;
    }

    .instruction.visible {
      opacity: 1;
    }

    .tap-area {
      position: fixed;
      inset: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .tap-area.hidden {
      display: none;
    }

    .hold-area {
      position: fixed;
      inset: 0;
      background: transparent;
      border: 0;
      display: none;
      cursor: pointer;
    }

    .hold-area.active {
      display: block;
    }

    .dimmed .text {
      filter: blur(0.35px);
      opacity: 0.72;
    }

    .final .instruction {
      display: none;
    }

    .hold-circle {
      position: fixed;
      width: 36px;
      height: 36px;
      transform: translate(-50%, -50%);
      border: 1.4px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
    }

    .hold-circle.visible {
      opacity: 1;
    }

    .hold-target {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(82vw, 82vh);
      height: min(82vw, 82vh);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .hold-target.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap" aria-live="polite">
    <div class="text" id="text"></div>
    <div class="instruction" id="instruction"></div>
    </div>

  <div class="hold-target" id="holdTarget" aria-hidden="true"></div>
  <div class="hold-circle" id="holdCircle" aria-hidden="true"></div>
  </div>

  <button class="tap-area" id="tapArea" aria-label="Weiter"></button>
  <button class="hold-area" id="holdArea" aria-label="Gedrückt halten, um weiterzugehen"></button>

  <script>
    const firstSection = [
      'She was different',
      'colder.',
      'They said things',
      'I didn’t listen.',
      'I followed her',
      'into the dark',
      'She asked me to come.',
      'I knew something was wrong.',
      'I went anyway.',
      'I think I saw it.',
      'I could have left.'
    ];

    const secondSection = [
      'I didn’t.',
      'Es ist dunkel.',
      'Ich kann nichts sehen.',
      'Ich spüre etwas auf meiner Haut.',
      'Ameisen auf meinen Armen.',
      'Schmetterlinge im Bauch.',
      'Ich bewege mich nicht.',
      'Ich kann mich nicht bewegen.'
    ];

    const finalSection = [
      'Ich bin immer noch da.',
      'Warum bin ich immer noch da?',
      'Warum bist <span class="highlight-red">du</span> immer noch da?'
    ];

    const textEl = document.getElementById('text');
    const instructionEl = document.getElementById('instruction');
    const holdCircle = document.getElementById('holdCircle');
    const holdTarget = document.getElementById('holdTarget');
    const tapArea = document.getElementById('tapArea');
    const holdArea = document.getElementById('holdArea');
    const wrap = document.getElementById('wrap');

    let phase = 'tap-1';
    let index = 0;
    let holdTimer = null;
    let holdStart = 0;
    let holdRAF = null;
    let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function showText(value, delay = 40) {
      textEl.classList.remove('visible');
      window.setTimeout(() => {
        textEl.textContent = value;
        textEl.classList.add('visible');
      }, reducedMotion ? 0 : delay);
    }

    function setInstruction(text = '', visible = false) {
      instructionEl.textContent = text;
      instructionEl.classList.toggle('visible', visible && !!text);
    }

    function showCircle(show) {
      holdCircle.classList.toggle('visible', show);
      holdTarget.classList.toggle('visible', show);
      if (!show) {
        holdCircle.style.width = '36px';
        holdCircle.style.height = '36px';
      }
    }

    function nextTapSection() {
      if (index < firstSection.length) {
        showText(firstSection[index]);
        index += 1;
        return;
      }

      phase = 'hold-1';
      tapArea.classList.add('hidden');
      holdArea.classList.add('active');
      setInstruction('hold', true);
      wrap.classList.add('dimmed');
    }

    function nextSecondSection() {
      if (index < secondSection.length) {
        showText(secondSection[index]);
        index += 1;
        return;
      }

      phase = 'hold-2';
      tapArea.classList.add('hidden');
      holdArea.classList.add('active');
      
      wrap.classList.add('dimmed');
    }

    function nextFinalSection() {
      if (index < finalSection.length) {
        showText(finalSection[index], index === 0 ? 220 : 120);
        index += 1;
        if (index === finalSection.length) {
          wrap.classList.add('final');
          textEl.dataset.finalQuestion = 'true';
        }
      }
    }

    function advance() {
      if (phase === 'tap-1') return nextTapSection();
      if (phase === 'tap-2') return nextSecondSection();
      if (phase === 'tap-3') return nextFinalSection();
    }

    function startHold(e) {
      showCircle(true);
      

      const point = e.touches ? e.touches[0] : e;
      holdCircle.style.left = point.clientX + 'px';
      holdCircle.style.top = point.clientY + 'px';

      holdStart = performance.now();
      cancelAnimationFrame(holdRAF);

      const tick = (now) => {
        const elapsed = now - holdStart;
        const progress = Math.min(elapsed / 2200, 1);
        const minSize = 36;
        const maxSize = Math.min(window.innerWidth, window.innerHeight) * 0.82;
        const size = minSize + (maxSize - minSize) * progress;
        holdCircle.style.width = `${size}px`;
        holdCircle.style.height = `${size}px`;
        document.body.style.backgroundColor = `rgba(0,0,0,${1 + progress * 0.02})`;
        if (progress < 1) {
          holdRAF = requestAnimationFrame(tick);
        } else {
          finishHold();
        }
      };

      holdRAF = requestAnimationFrame(tick);
    }

    function cancelHold() {
      cancelAnimationFrame(holdRAF);
      holdCircle.style.width = '36px';
      holdCircle.style.height = '36px';
      document.body.style.backgroundColor = '#000';
    }

    function finishHold() {
      cancelAnimationFrame(holdRAF);
      holdArea.classList.remove('active');
      wrap.classList.remove('dimmed');
      showCircle(false);
      setInstruction('', false);
      document.body.style.backgroundColor = '#000';

      if (phase === 'hold-1') {
        phase = 'tap-2';
        index = 0;
        tapArea.classList.remove('hidden');
        showText(secondSection[index], 80);
        index += 1;
      } else if (phase === 'hold-2') {
        phase = 'tap-3';
        index = 0;
        tapArea.classList.remove('hidden');
        textEl.classList.remove('visible');
        setTimeout(() => {
          textEl.innerHTML = finalSection[index];
          textEl.classList.add('visible');
        }, 180);
        textEl.style.fontSize = '';
        index += 1;
      }
    }

    tapArea.addEventListener('click', () => {
      if (textEl.dataset.finalQuestion === 'true') {
        const text = textEl.textContent;
        const wrapWidth = wrap.clientWidth * 0.94;
        const currentSize = parseFloat(getComputedStyle(textEl).fontSize);
        const test = document.createElement('span');
        test.style.position = 'absolute';
        test.style.visibility = 'hidden';
        test.style.whiteSpace = 'nowrap';
        test.style.fontFamily = getComputedStyle(textEl).fontFamily;
        test.style.fontSize = `${currentSize + 2}px`;
        test.style.letterSpacing = getComputedStyle(textEl).letterSpacing;
        test.textContent = text;
        document.body.appendChild(test);
        const fits = test.getBoundingClientRect().width <= wrapWidth;
        document.body.removeChild(test);
        if (fits) {
          textEl.style.fontSize = `${currentSize + 2}px`;
        }
        return;
      }
      advance();
    });

    const holdStartEvents = ['mousedown', 'touchstart', 'pointerdown'];
    const holdEndEvents = ['mouseup', 'mouseleave', 'touchend', 'touchcancel', 'pointerup', 'pointercancel'];

    holdStartEvents.forEach(eventName => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        startHold(e);
      }, { passive: false });
    });

    holdEndEvents.forEach(eventName => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        if (phase === 'hold-1' || phase === 'hold-2') cancelHold();
      }, { passive: false });
    });

    // Initial state
    showText(firstSection[index], 150);
    index += 1;
  </script>
</body>
</html>
