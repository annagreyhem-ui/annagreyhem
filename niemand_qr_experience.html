<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niemand — QR Experience</title>
  <style>
    :root {
      --bg: #000;
      --fg: #f3f3f3;
      --muted: #9a9a9a;
      --hold-duration: 2200;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: min(680px, 88vw);
      min-height: 42vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 2rem 1rem;
      z-index: 2;
      pointer-events: none;
    }

    .text {
      font-size: clamp(1.15rem, 2.8vw, 1.55rem);
      line-height: 1.45;
      letter-spacing: 0.01em;
      max-width: 26ch;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease, font-size 220ms ease;
      user-select: none;
    }

    .text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .highlight-em {
      font-style: italic;
    }

    .instruction {
      position: fixed;
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 220ms ease;
      z-index: 5;
      user-select: none;
    }

    .instruction.visible {
      opacity: 1;
    }

    .tap-area,
    .hold-area {
      position: fixed;
      inset: 0;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      z-index: 4;
      appearance: none;
      -webkit-appearance: none;
    }

    .hidden {
      display: none !important;
    }

    .hold-area {
      display: none;
    }

    .hold-area.active {
      display: block;
    }

    .hold-target {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(82vw, 82vh);
      height: min(82vw, 82vh);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 0;
    }

    .hold-target.visible {
      opacity: 1;
    }

    .hold-circle {
      position: fixed;
      width: 36px;
      height: 36px;
      transform: translate(-50%, -50%);
      border: 1.4px solid rgba(255,255,255,0.65);
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 3;
    }

    .hold-circle.visible {
      opacity: 1;
    }

    .spark-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      overflow: hidden;
    }

    .spark {
      position: fixed;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.9);
      pointer-events: none;
      will-change: transform, opacity;
      animation: sparkle-burst 900ms ease-out forwards;
    }
    }

    @keyframes sparkle-burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      70% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.2);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="text" id="text"></div>
  </div>

  <div class="instruction" id="instruction"></div>
  <div class="hold-target" id="holdTarget" aria-hidden="true"></div>
  <div class="hold-circle" id="holdCircle" aria-hidden="true"></div>
  <div class="spark-layer" id="sparkLayer" aria-hidden="true"></div>

  <button class="tap-area" id="tapArea" aria-label="Weiter"></button>
  <button class="hold-area" id="holdArea" aria-label="Gedrückt halten"></button>

  <script>
    const flow = [
      'She was different',
      'colder.',
      'They said things',
      'I didn’t listen.',
      'I followed her',
      'into the dark.',

      'She asked me to come.',
      'I knew something was wrong.',
      'I went anyway.',
      'I think I saw it.',
      'I could have left.',
      'I didn’t.',

      'HOLD',

      'Es ist dunkel.',
      'Ich kann nichts sehen.',
      'Ich spüre etwas auf meiner Haut.',
      'Ameisen auf meinen Armen.',
      'Schmetterlinge im Bauch.',
      'Ich bewege mich nicht.',
      'Ich kann mich nicht bewegen.',

      'HOLD',

      'Ich bin immer noch da.',
      'Warum bin ich immer noch da?',
      'Warum bist <span class="highlight-em">du</span> immer noch da?'
    ];

    const textEl = document.getElementById('text');
    const instructionEl = document.getElementById('instruction');
    const tapArea = document.getElementById('tapArea');
    const holdArea = document.getElementById('holdArea');
    const holdCircle = document.getElementById('holdCircle');
    const holdTarget = document.getElementById('holdTarget');
    const sparkLayer = document.getElementById('sparkLayer');

    let i = 0;
    let holdRaf = null;
    let holdStart = 0;
    let canGrowFinal = false;
    let finalAtMax = false;
    let exploded = false;
    let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function currentItem() {
      return flow[i];
    }

    function showText(content, isHtml = false, delay = 0) {
      textEl.classList.remove('visible');
      setTimeout(() => {
        if (isHtml) textEl.innerHTML = content;
        else textEl.textContent = content;
        textEl.classList.add('visible');
      }, reducedMotion ? 0 : delay);
    }

    function blankThen(callback, ms) {
      textEl.classList.remove('visible');
      setTimeout(callback, reducedMotion ? 0 : ms);
    }

    function setInstruction(text = '', show = false) {
      instructionEl.textContent = text;
      instructionEl.classList.toggle('visible', show && !!text);
    }

    function showHoldVisuals(show) {
      holdCircle.classList.toggle('visible', show);
      holdTarget.classList.toggle('visible', show);
      if (!show) {
        holdCircle.style.width = '36px';
        holdCircle.style.height = '36px';
      }
    }

    function enterHold() {
      tapArea.classList.add('hidden');
      holdArea.classList.add('active');
      setInstruction('hold', true);
    }

    function leaveHold() {
      holdArea.classList.remove('active');
      tapArea.classList.remove('hidden');
      setInstruction('', false);
      showHoldVisuals(false);
    }

    function advance() {
      const item = currentItem();
      if (!item) return;

      if (item === 'HOLD') {
        enterHold();
        return;
      }

      const isFinalLast = i === flow.length - 1;
      const isHtml = isFinalLast;

      // pause before first German line
      if (item === 'Es ist dunkel.') {
        i += 1;
        blankThen(() => showText(item, false, 0), 800);
        return;
      }

      // pause before first final line
      if (item === 'Ich bin immer noch da.') {
        i += 1;
        blankThen(() => showText(item, false, 0), 900);
        return;
      }

      showText(item, isHtml, i === flow.length - 3 ? 180 : 0);
      i += 1;

      if (isFinalLast) {
        canGrowFinal = true;
        finalAtMax = false;
      }
    }

    function beginHold(e) {
      const point = e.touches ? e.touches[0] : e;
      holdCircle.style.left = point.clientX + 'px';
      holdCircle.style.top = point.clientY + 'px';
      showHoldVisuals(true);
      setInstruction('keep holding', true);
      holdStart = performance.now();
      cancelAnimationFrame(holdRaf);

      const tick = (now) => {
        const elapsed = now - holdStart;
        const progress = Math.min(elapsed / Number(getComputedStyle(document.documentElement).getPropertyValue('--hold-duration')), 1);
        const min = 36;
        const max = Math.min(window.innerWidth, window.innerHeight) * 0.82;
        const size = min + (max - min) * progress;
        holdCircle.style.width = `${size}px`;
        holdCircle.style.height = `${size}px`;
        if (progress < 1) {
          holdRaf = requestAnimationFrame(tick);
        } else {
          finishHold();
        }
      };

      holdRaf = requestAnimationFrame(tick);
    }

    function cancelHold() {
      cancelAnimationFrame(holdRaf);
      showHoldVisuals(false);
      setInstruction('hold', true);
    }

    function finishHold() {
      cancelAnimationFrame(holdRaf);
      leaveHold();
      if (currentItem() === 'HOLD') {
        i += 1;
      }
      advance();
    }

    tapArea.addEventListener('click', () => {
      if (exploded) return;

      if (canGrowFinal) {
        const currentSize = parseFloat(getComputedStyle(textEl).fontSize);
        const wrapWidth = Math.min(680, window.innerWidth * 0.88) * 0.94;
        const probe = document.createElement('span');
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.whiteSpace = 'nowrap';
        probe.style.fontFamily = getComputedStyle(textEl).fontFamily;
        probe.style.fontSize = `${currentSize + 2}px`;
        probe.style.letterSpacing = getComputedStyle(textEl).letterSpacing;
        probe.innerHTML = textEl.innerHTML;
        document.body.appendChild(probe);
        const fits = probe.getBoundingClientRect().width <= wrapWidth;
        document.body.removeChild(probe);

        if (fits) {
          textEl.style.fontSize = `${currentSize + 2}px`;
          finalAtMax = false;
        } else if (!finalAtMax) {
          finalAtMax = true;
        } else {
          explodeFinalText();
        }
        return;
      }

      advance();
    });

    ['mousedown', 'touchstart', 'pointerdown'].forEach((eventName) => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        beginHold(e);
      }, { passive: false });
    });

    ['mouseup', 'mouseleave', 'touchend', 'touchcancel', 'pointerup', 'pointercancel'].forEach((eventName) => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        if (currentItem() === 'HOLD') cancelHold();
      }, { passive: false });
    });

    function explodeFinalText() {
      exploded = true;
      const rect = textEl.getBoundingClientRect();
      const count = 60;

      for (let n = 0; n < count; n += 1) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        const x = rect.left + Math.random() * rect.width;
        const y = rect.top + Math.random() * rect.height;
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.max(window.innerWidth, window.innerHeight) * 1.2;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const size = 2 + Math.random() * 3.5;
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.width = `${size}px`;
        spark.style.height = `${size}px`;
        spark.style.setProperty('--dx', `${dx}px`);
        spark.style.setProperty('--dy', `${dy}px`);
        spark.style.animationDelay = `${Math.random() * 60}ms`;
        sparkLayer.appendChild(spark);
        setTimeout(() => spark.remove(), 900);
      }

      textEl.classList.remove('visible');
      setTimeout(() => {
        textEl.innerHTML = '';
      }, 120);

      setTimeout(() => {
        sparkLayer.innerHTML = '';
        document.body.style.background = '#000';
      }, 950);
    }

    advance();
  </script>
</body>
</html>
