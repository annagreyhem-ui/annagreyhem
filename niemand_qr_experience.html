<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niemand — QR Experience</title>
  <style>
    :root {
      --bg: #000;
      --fg: #f3f3f3;
      --muted: #9a9a9a;
      --hold-duration: 2200;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: min(680px, 88vw);
      min-height: 42vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 2rem 1rem;
      z-index: 2;
    }

    .text {
      font-size: clamp(1.15rem, 2.8vw, 1.55rem);
      line-height: 1.45;
      letter-spacing: 0.01em;
      max-width: 26ch;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease, font-size 220ms ease;
      user-select: none;
    }

    .text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .highlight-em { font-style: italic; }

    .instruction {
      position: fixed;
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: lowercase;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 250ms ease;
      z-index: 3;
      user-select: none;
    }

    .instruction.visible { opacity: 1; }

    .tap-area, .hold-area {
      position: fixed;
      inset: 0;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      z-index: 1;
      appearance: none;
      -webkit-appearance: none;
    }

    .tap-area.hidden, .hold-area.hidden { display: none; }
    .hold-area { display: none; }
    .hold-area.active { display: block; }

    .hold-target {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(82vw, 82vh);
      height: min(82vw, 82vh);
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 0;
    }

    .hold-target.visible { opacity: 1; }

    .hold-circle {
      position: fixed;
      width: 36px;
      height: 36px;
      transform: translate(-50%, -50%);
      border: 1.4px solid rgba(255,255,255,0.65);
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 2;
    }

    .hold-circle.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="text" id="text"></div>
  </div>

  <div class="instruction" id="instruction"></div>
  <div class="hold-target" id="holdTarget" aria-hidden="true"></div>
  <div class="hold-circle" id="holdCircle" aria-hidden="true"></div>

  <button class="tap-area" id="tapArea" aria-label="Weiter"></button>
  <button class="hold-area" id="holdArea" aria-label="Gedrückt halten"></button>

  <script>
    const firstSection = [
      'She was different',
      'colder.',
      'They said things',
      'I didn’t listen.',
      'I followed her',
      'into the dark.'
    ];

    const secondSection = [
      'She asked me to come.',
      'I knew something was wrong.',
      'I went anyway.',
      'I think I saw it.',
      'I could have left.',
      'I didn’t.',
      'Es ist dunkel.',
      'Ich kann nichts sehen.',
      'Ich spüre etwas auf meiner Haut.',
      'Ameisen auf meinen Armen.',
      'Schmetterlinge im Bauch.',
      'Ich bewege mich nicht.',
      'Ich kann mich nicht bewegen.'
    ];

    const finalSection = [
      'Ich bin immer noch da.',
      'Warum bin ich immer noch da?',
      'Warum bist <span class="highlight-em">du</span> immer noch da?'
    ];

    const textEl = document.getElementById('text');
    const instructionEl = document.getElementById('instruction');
    const tapArea = document.getElementById('tapArea');
    const holdArea = document.getElementById('holdArea');
    const holdCircle = document.getElementById('holdCircle');
    const holdTarget = document.getElementById('holdTarget');

    let phase = 'first';
    let index = 0;
    let holdRaf = null;
    let holdStart = 0;
    let canGrowFinal = false;
    let pausedGerman = false;

    function showText(content, isHtml = false, delay = 0) {
      textEl.classList.remove('visible');
      setTimeout(() => {
        if (isHtml) textEl.innerHTML = content;
        else textEl.textContent = content;
        textEl.classList.add('visible');
      }, delay);
    }

    function blankThen(callback, ms) {
      textEl.classList.remove('visible');
      setTimeout(callback, ms);
    }

    function setInstruction(text = '', show = false) {
      instructionEl.textContent = text;
      instructionEl.classList.toggle('visible', show && !!text);
    }

    function showHoldVisuals(show) {
      holdCircle.classList.toggle('visible', show);
      holdTarget.classList.toggle('visible', show);
      if (!show) {
        holdCircle.style.width = '36px';
        holdCircle.style.height = '36px';
      }
    }

    function advanceFirst() {
      if (index < firstSection.length) {
        showText(firstSection[index]);
        index += 1;
        return;
      }
      phase = 'hold1-ready';
      tapArea.classList.add('hidden');
      holdArea.classList.add('active');
      setInstruction('hold', true);
    }

    function advanceSecond() {
      // show until "I didn’t." then trigger hold
      if (index < secondSection.length) {
        // stop at "I didn’t." (index 5)
        if (index === 5) {
          showText(secondSection[index]);
          index += 1;

          // next step should be hold
          phase = 'hold2-ready';
          tapArea.classList.add('hidden');
          holdArea.classList.add('active');
          setInstruction('hold', true);
          return;
        }

        showText(secondSection[index]);
        index += 1;
        return;
      }
    }

      if (index === 6 && !pausedGerman) {
        pausedGerman = true;
        const line = secondSection[index];
        index += 1;
        blankThen(() => showText(line), 800);
        return;
      }

      showText(secondSection[index]);
      index += 1;
    }

    function advanceFinal() {
      if (index < finalSection.length) {
        const isLast = index === finalSection.length - 1;
        showText(finalSection[index], isLast);
        index += 1;

        if (index >= finalSection.length) {
          canGrowFinal = true;
        }
      }
    }
    }

    function advance() {
      if (phase === 'first') return advanceFirst();
      if (phase === 'second') return advanceSecond();

      if (phase === 'second-continued') {
        // stop at last German line before final hold
        if (index < secondSection.length) {
          if (index === secondSection.length - 1) {
            showText(secondSection[index]);
            index += 1;

            phase = 'hold3-ready';
            tapArea.classList.add('hidden');
            holdArea.classList.add('active');
            setInstruction('hold', true);
            return;
          }

          showText(secondSection[index]);
          index += 1;
          return;
        }
      }

      if (phase === 'final') return advanceFinal();
    }

    function beginHold(e) {
      const point = e.touches ? e.touches[0] : e;
      holdCircle.style.left = point.clientX + 'px';
      holdCircle.style.top = point.clientY + 'px';
      showHoldVisuals(true);
      setInstruction('keep holding', true);
      holdStart = performance.now();
      cancelAnimationFrame(holdRaf);

      const tick = (now) => {
        const elapsed = now - holdStart;
        const progress = Math.min(elapsed / Number(getComputedStyle(document.documentElement).getPropertyValue('--hold-duration')), 1);
        const min = 36;
        const max = Math.min(window.innerWidth, window.innerHeight) * 0.82;
        const size = min + (max - min) * progress;
        holdCircle.style.width = `${size}px`;
        holdCircle.style.height = `${size}px`;
        if (progress < 1) {
          holdRaf = requestAnimationFrame(tick);
        } else {
          finishHold();
        }
      };

      holdRaf = requestAnimationFrame(tick);
    }

    function cancelHold() {
      cancelAnimationFrame(holdRaf);
      showHoldVisuals(false);
      setInstruction('hold', true);
    }

    function finishHold() {
      cancelAnimationFrame(holdRaf);
      showHoldVisuals(false);
      holdArea.classList.remove('active');
      setInstruction('', false);

      // after first hold → go to second section
      if (phase === 'hold1-ready') {
        phase = 'second';
        index = 0;
        tapArea.classList.remove('hidden');
        showText(secondSection[0]);
        index = 1;
        return;
      }

      // after "I didn’t." hold → continue German part
      if (phase === 'hold2-ready') {
        phase = 'second-continued';
        tapArea.classList.remove('hidden');
        showText(secondSection[index]); // "Es ist dunkel."
        index += 1;
        return;
      }

      // final hold → go to ending
      if (phase === 'hold3-ready') {
        phase = 'final';
        index = 0;
        tapArea.classList.remove('hidden');
        textEl.style.fontSize = '';
        showText(finalSection[0]);
        index = 1;
      }
    }

      if (phase === 'hold2-ready') {
        phase = 'final';
        index = 0;
        tapArea.classList.remove('hidden');
        textEl.style.fontSize = '';
        blankThen(() => {
          showText(finalSection[0], false, 0);
          index = 1;
        }, 900);
      }
    }

    tapArea.addEventListener('click', () => {
      if (canGrowFinal) {
        const currentSize = parseFloat(getComputedStyle(textEl).fontSize);
        const wrapWidth = Math.min(680, window.innerWidth * 0.88) * 0.94;
        const probe = document.createElement('span');
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.whiteSpace = 'nowrap';
        probe.style.fontFamily = getComputedStyle(textEl).fontFamily;
        probe.style.fontSize = `${currentSize + 2}px`;
        probe.style.letterSpacing = getComputedStyle(textEl).letterSpacing;
        probe.innerHTML = textEl.innerHTML;
        document.body.appendChild(probe);
        const fits = probe.getBoundingClientRect().width <= wrapWidth;
        document.body.removeChild(probe);
        if (fits) textEl.style.fontSize = `${currentSize + 2}px`;
        return;
      }
      advance();
    });

    ['mousedown', 'touchstart', 'pointerdown'].forEach((eventName) => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        beginHold(e);
      }, { passive: false });
    });

    ['mouseup', 'mouseleave', 'touchend', 'touchcancel', 'pointerup', 'pointercancel'].forEach((eventName) => {
      holdArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        if (phase === 'hold1-ready' || phase === 'hold2-ready') cancelHold();
      }, { passive: false });
    });

    showText(firstSection[0], false, 120);
    index = 1;
  </script>
</body>
</html>
