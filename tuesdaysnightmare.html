<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; user-select:none; }

#room {
  position:fixed; inset:0;
}
#room video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* light switch – on the wall, left of bed */
#switch {
  position:fixed;
  left: 28%;
  top: 42%;
  transform: translate(-50%, -50%);
  z-index:50;
  cursor:none;
  -webkit-tap-highlight-color:transparent;
}

#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%; pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
  transition:background 0.5s;
}
body.on #cursor { background:rgba(0,0,0,0.28); }

/* graffiti – constrained to left wall above bed */
#graffiti {
  position:fixed;
  left: 5%;
  top: 18%;
  width: 48%;
  z-index:40;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.3s ease;
  transform: rotate(-2deg);
  transform-origin: left center;
  -webkit-mask-image: linear-gradient(to right, black 55%, transparent 92%),
                      linear-gradient(to bottom, black 70%, transparent 100%);
  -webkit-mask-composite: destination-in;
  mask-image: linear-gradient(to right, black 55%, transparent 92%),
              linear-gradient(to bottom, black 70%, transparent 100%);
  mask-composite: intersect;
}
#graffiti.show { opacity:0.88; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <video id="vid" preload="auto" playsinline muted></video>
</div>

<img id="graffiti" src="./graffiti.png" alt="">

<div id="switch" onclick="toggle()">
  <svg width="28" height="52" viewBox="0 0 28 52">
    <rect x="1" y="1" width="26" height="50" rx="3"
      id="sw-bg" fill="#1e1a12" stroke="#3a3020" stroke-width="1"/>
    <rect x="7" y="6" width="14" height="20" rx="2"
      id="sw-tog" fill="#2e2818"/>
  </svg>
</div>

<script>
// cursor
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX+'px';
  cur.style.top  = e.clientY+'px';
});

var vid    = document.getElementById('vid');
var flash  = document.getElementById('flash');
var graffiti = document.getElementById('graffiti');
var isOn   = false;
var busy   = false;
var DURATION = 2.894;
var clickCount = 0;

vid.src = './room.mp4';
vid.load();

// park on first frame
vid.addEventListener('loadeddata', function() {
  vid.currentTime = 0;
});

function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.45';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.25s ease';
    flash.style.opacity = '0';
  }, 40);
}

function updateSwitch() {
  var bg  = document.getElementById('sw-bg');
  var tog = document.getElementById('sw-tog');
  if (isOn) {
    bg.setAttribute('fill','#cec0a4');
    bg.setAttribute('stroke','#a09070');
    tog.setAttribute('fill','#b0a080');
    tog.setAttribute('y','26');
  } else {
    bg.setAttribute('fill','#1e1a12');
    bg.setAttribute('stroke','#3a3020');
    tog.setAttribute('fill','#2e2818');
    tog.setAttribute('y','6');
  }
}

var rafId = null;
var SPEED_ON  = 2.894;  // ~1s to turn on
var SPEED_OFF = 8.0;    // ~0.35s to turn off – abrupt

function toggle() {
  if (busy) return;
  busy = true;
  doFlash();

  isOn = !isOn;
  document.body.classList.toggle('on', isOn);
  updateSwitch();
  clickCount++;

  // graffiti appears when lights go OFF on every 4th click (clicks 4, 8, 12...)
  if (!isOn && clickCount % 4 === 0) {
    graffiti.classList.add('show');
  } else {
    graffiti.classList.remove('show');
  }

  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  vid.pause();

  var startTime = null;
  var startVidTime = isOn ? 0 : DURATION;
  var direction = isOn ? 1 : -1;
  var speed = isOn ? SPEED_ON : SPEED_OFF;

  vid.currentTime = startVidTime;

  function step(ts) {
    if (!startTime) startTime = ts;
    var elapsed = (ts - startTime) / 1000;
    var newTime = startVidTime + direction * elapsed * speed;
    newTime = Math.max(0, Math.min(DURATION, newTime));
    vid.currentTime = newTime;

    if ((direction > 0 && newTime >= DURATION) || (direction < 0 && newTime <= 0)) {
      vid.currentTime = direction > 0 ? DURATION : 0;
      rafId = null;
      busy = false;
      return;
    }
    rafId = requestAnimationFrame(step);
  }

  rafId = requestAnimationFrame(step);
}

// touch support
document.getElementById('switch').addEventListener('touchend', function(e) {
  e.preventDefault();
  toggle();
});
</script>
</body>
</html>
