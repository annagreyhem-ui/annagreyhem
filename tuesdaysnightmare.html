<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; user-select:none; }

#room {
  position:fixed; inset:0;
}
#room img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}
#img-dark  { opacity:1; z-index:1; }
#img-light { opacity:0; z-index:2; transition:opacity 0.6s ease; }
body.on #img-light { opacity:1; }

/* light switch hotspot */
#switch {
  position:fixed;
  left: 24%;
  top: 52%;
  transform: translate(-50%, -50%);
  z-index:50;
  cursor:none;
  -webkit-tap-highlight-color:transparent;
}

#sw-plate {
  width:28px; height:52px;
}

#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%; pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
  transition:background 0.5s;
}
body.on #cursor { background:rgba(0,0,0,0.28); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <img id="img-dark"  src="./room-dark.png"  alt="">
  <img id="img-light" src="./room-light.png" alt="">
</div>

<div id="switch" onclick="toggle()">
  <svg id="sw-plate" width="28" height="52" viewBox="0 0 28 52">
    <rect x="1" y="1" width="26" height="50" rx="3"
      id="sw-bg" fill="#1e1a12" stroke="#3a3020" stroke-width="1"/>
    <rect x="7" y="6" width="14" height="20" rx="2"
      id="sw-tog" fill="#2e2818"/>
  </svg>
</div>

<script>
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX+'px';
  cur.style.top  = e.clientY+'px';
});

var isOn = false;
var flash = document.getElementById('flash');

function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.5';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.25s ease';
    flash.style.opacity = '0';
  }, 40);
}

function toggle() {
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);

  var bg  = document.getElementById('sw-bg');
  var tog = document.getElementById('sw-tog');
  if (isOn) {
    bg.setAttribute('fill','#cec0a4'); bg.setAttribute('stroke','#a09070');
    tog.setAttribute('fill','#b0a080'); tog.setAttribute('y','26');
  } else {
    bg.setAttribute('fill','#1e1a12'); bg.setAttribute('stroke','#3a3020');
    tog.setAttribute('fill','#2e2818'); tog.setAttribute('y','6');
  }
}

var sw = document.getElementById('switch');
sw.addEventListener('touchend', function(e) { e.preventDefault(); toggle(); });
</script>
</body>
</html>
