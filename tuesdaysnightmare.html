<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Cormorant Garamond', serif;
  cursor:none;
  user-select:none;
}

#room {
  position:fixed; inset:0;
}

#room img {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
}

#img-dark  { opacity:1; transition:opacity 0.1s ease; z-index:1; }
#img-light { opacity:0; transition:opacity 0.1s ease; z-index:2; }

body.on #img-dark  { opacity:0; }
body.on #img-light { opacity:1; }

#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff;
  opacity:0;
  pointer-events:none;
}

/* Switch hotspot – left side of bed where switch is in image */
#switch {
  position:fixed;
  left: 27.5%;
  top: 54%;
  transform: translate(-50%, -50%);
  z-index:50;
  cursor:none;
  width:48px;
  height:52px;
}

#switch-hit {
  width:100%; height:100%;
  border-radius:3px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}

#switch:hover #switch-hit {
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 0 12px rgba(255,255,255,0.08);
}

body.on #switch:hover #switch-hit {
  border-color: rgba(0,0,0,0.2);
}

#text-wrap {
  position:fixed;
  top:0; left:0; right:0;
  z-index:60;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding: clamp(28px,5vh,56px) 24px 0;
  pointer-events:none;
}

#title {
  font-size:clamp(11px,1.1vw,14px);
  font-style:italic;
  font-weight:300;
  letter-spacing:0.45em;
  color:rgba(255,255,255,0.2);
  margin-bottom:clamp(18px,3.5vh,36px);
  transition:color 0.6s;
  text-transform:lowercase;
}

body.on #title { color:rgba(20,12,4,0.25); }

#story {
  max-width:500px;
  width:100%;
  text-align:center;
  font-size:clamp(14px,1.5vw,18px);
  font-style:italic;
  font-weight:300;
  line-height:2.1;
  letter-spacing:0.03em;
  color:rgba(255,255,255,0);
  transition:color 1.2s ease;
}

#story.show { color:rgba(255,255,255,0.5); }
body.on #story.show { color:rgba(20,12,4,0.52); }

#question {
  position:fixed;
  bottom: clamp(44px,9vh,80px);
  left:50%;
  transform:translateX(-50%);
  z-index:60;
  font-size:clamp(14px,1.5vw,19px);
  font-style:italic;
  font-weight:300;
  letter-spacing:0.05em;
  color:rgba(255,255,255,0);
  transition:color 2s ease;
  white-space:nowrap;
  pointer-events:none;
}

#question.show { color:rgba(255,255,255,0.42); }
body.on #question.show { color:rgba(20,12,4,0.38); }

#credit {
  position:fixed;
  bottom:16px; left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:0.3em;
  font-style:italic;
  color:rgba(255,255,255,0.08);
  z-index:60;
  transition:color 0.5s;
  white-space:nowrap;
}
body.on #credit { color:rgba(20,12,4,0.1); }

#cursor {
  position:fixed;
  width:5px; height:5px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:background 0.4s;
}
body.on #cursor { background:rgba(0,0,0,0.25); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <img id="img-dark"  src="./room-dark.jpg"  alt="">
  <img id="img-light" src="./room-light.jpg" alt="">
</div>

<div id="text-wrap">
  <div id="title">Tuesday's Nightmare</div>
  <div id="story"></div>
</div>

<div id="switch" onclick="handleSwitch()">
  <div id="switch-hit"></div>
</div>

<div id="question"></div>
<div id="credit">Anna Greyhem</div>

<script>
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

var isOn = false;
var clicks = 0;
var story = document.getElementById('story');
var question = document.getElementById('question');
var flash = document.getElementById('flash');

var texts = [
  "I woke up. It was dark in the room. I wanted to get up so I pressed the light switch. The light switch didn't work. I tried to push it again. My light switch always worked. This must be a dream. And I fear, I know that this is a scary dream.",
  "I woke up. I was relieved. What a heavy dream. It was still early, so the room was dark. I got up, told my boyfriend about this dream and turned on the light switch. It didn't work. This was a funny coincidence. I tried again and it didn't work. And I realized this must be a dream.",
  "I feared to wake up again.",
  "I woke up again."
];

function showText(t) {
  story.classList.remove('show');
  void story.offsetWidth;
  story.textContent = t;
  setTimeout(function() { story.classList.add('show'); }, 50);
}

setTimeout(function() { showText(texts[0]); }, 1000);

function doFlash() {
  flash.style.transition = 'opacity 0.03s';
  flash.style.opacity = '0.55';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.22s';
    flash.style.opacity = '0';
  }, 45);
}

function handleSwitch() {
  clicks++;
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);

  if (clicks === 1) {
    showText(texts[1]);
  } else if (clicks === 2) {
    showText(texts[2]);
  } else if (clicks === 3) {
    showText(texts[3]);
    setTimeout(function() {
      question.textContent = 'Should I try the light switch again?';
      question.classList.add('show');
    }, 2200);
  }
}

document.getElementById('switch').addEventListener('touchend', function(e) {
  e.preventDefault();
  handleSwitch();
});
</script>
</body>
</html>
