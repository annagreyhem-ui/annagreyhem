<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; user-select:none; }

#room {
  position:fixed; inset:0;
}
#room video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* light switch SVG overlay */
#switch {
  position:fixed;
  left: 24%;
  top:  48%;
  transform: translate(-50%, -50%);
  z-index:50;
  cursor:none;
  -webkit-tap-highlight-color:transparent;
}

#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%; pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
  transition:background 0.4s;
}
body.on #cursor { background:rgba(0,0,0,0.28); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <video id="vid" preload="auto" playsinline muted></video>
</div>

<!-- Light switch SVG -->
<div id="switch" onclick="toggleLight()">
  <svg id="sw-svg" width="28" height="52" viewBox="0 0 28 52">
    <!-- plate -->
    <rect x="1" y="1" width="26" height="50" rx="3" ry="3"
      fill="#1e1a12" stroke="#3a3020" stroke-width="1"/>
    <!-- toggle -->
    <rect id="sw-toggle" x="7" y="6" width="14" height="20" rx="2" ry="2"
      fill="#2e2818"/>
  </svg>
</div>

<script>
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
});

var vid = document.getElementById('vid');
var isOn = false;
var busy = false;

vid.src = './room.mp4';
vid.load();

// Show first frame immediately
vid.addEventListener('loadeddata', function() {
  vid.currentTime = 0;
});

function doFlash() {
  var fl = document.getElementById('flash');
  fl.style.transition = 'none'; fl.style.opacity = '0.55';
  setTimeout(function() { fl.style.transition = 'opacity 0.2s'; fl.style.opacity = '0'; }, 40);
}

function toggleLight() {
  if (busy) return;
  busy = true;
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);

  // update switch visual
  var tog = document.getElementById('sw-toggle');
  var plate = vid.parentElement.previousElementSibling.previousElementSibling;
  if (isOn) {
    document.querySelector('#sw-svg rect:first-child').setAttribute('fill','#cec0a4');
    document.querySelector('#sw-svg rect:first-child').setAttribute('stroke','#a09070');
    tog.setAttribute('fill','#b0a080');
    tog.setAttribute('y','26');
  } else {
    document.querySelector('#sw-svg rect:first-child').setAttribute('fill','#1e1a12');
    document.querySelector('#sw-svg rect:first-child').setAttribute('stroke','#3a3020');
    tog.setAttribute('fill','#2e2818');
    tog.setAttribute('y','6');
  }

  var duration = vid.duration || 2;
  if (isOn) {
    // play forward
    vid.playbackRate = 1;
    vid.play();
    setTimeout(function() { vid.pause(); busy = false; }, duration * 1000);
  } else {
    // play backward
    var interval = setInterval(function() {
      vid.currentTime = Math.max(0, vid.currentTime - 0.04);
      if (vid.currentTime <= 0) { clearInterval(interval); busy = false; }
    }, 33);
  }
}

document.getElementById('switch').addEventListener('touchend', function(e) {
  e.preventDefault(); toggleLight();
});
</script>
</body>
</html>
