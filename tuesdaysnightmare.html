<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --dark-bg: #07080f;
  --light-bg: #c8cfe0;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Cormorant Garamond', serif;
  cursor:none;
  user-select:none;
}

/* Room layers */
#room {
  position:fixed; inset:0;
  transition: none;
}

#room-dark {
  position:absolute; inset:0;
  background: var(--dark-bg);
  opacity:1;
  transition: opacity 0.08s ease;
}

#room-light {
  position:absolute; inset:0;
  background: var(--dark-bg);
  opacity:0;
  transition: opacity 0.08s ease;
}

#img-dark {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  opacity:1;
}

#img-light {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  opacity:1;
  filter: brightness(2.2) saturate(0.4) contrast(0.85);
}

/* Flash on switch */
#flash {
  position:fixed; inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:50;
  transition: opacity 0.04s ease;
}

/* Text overlay */
#text-wrap {
  position:fixed;
  top:0; left:0; right:0;
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:clamp(40px,8vh,80px) 24px 0;
  pointer-events:none;
}

#title {
  font-size:clamp(13px,1.4vw,17px);
  font-style:italic;
  letter-spacing:0.35em;
  color:rgba(255,255,255,0.25);
  margin-bottom:clamp(28px,5vh,48px);
  transition: color 0.4s;
  font-weight:300;
  text-transform:lowercase;
}

#story {
  max-width:560px;
  width:100%;
  text-align:center;
  font-size:clamp(16px,1.8vw,21px);
  font-style:italic;
  line-height:2;
  font-weight:300;
  color:rgba(255,255,255,0.0);
  transition: color 0.8s ease, opacity 0.8s ease;
  letter-spacing:0.04em;
}

#story.visible {
  color:rgba(255,255,255,0.55);
}

body.lights-on #story.visible {
  color:rgba(20,25,40,0.65);
}

body.lights-on #title {
  color:rgba(20,25,40,0.3);
}

/* Light switch */
#switch-area {
  position:fixed;
  z-index:30;
  /* positioned to match the switch in the image – right side, mid-height */
  right: clamp(18px, 5vw, 60px);
  top: 50%;
  transform: translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:none;
}

#switch-plate {
  width:34px;
  height:56px;
  border-radius:4px;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  position:relative;
}

#switch-plate:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}

body.lights-on #switch-plate {
  background: rgba(0,0,0,0.08);
  border-color: rgba(0,0,0,0.18);
}

body.lights-on #switch-plate:hover {
  background: rgba(0,0,0,0.14);
}

#switch-toggle {
  width:18px;
  height:26px;
  border-radius:3px;
  background: rgba(200,200,210,0.5);
  transition: transform 0.12s ease, background 0.2s;
  position:relative;
}

body.lights-on #switch-toggle {
  transform: translateY(5px);
  background: rgba(60,60,80,0.4);
}

#switch-label {
  font-size:11px;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.2);
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  transition:color 0.4s;
  text-align:center;
  line-height:1.6;
}

body.lights-on #switch-label {
  color:rgba(0,0,0,0.2);
}

/* custom cursor */
#cursor {
  position:fixed;
  width:6px; height:6px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition: background 0.4s, transform 0.1s;
}

body.lights-on #cursor {
  background:rgba(0,0,20,0.4);
}

/* bottom credit */
#credit {
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:0.25em;
  font-style:italic;
  color:rgba(255,255,255,0.1);
  z-index:20;
  transition:color 0.4s;
  white-space:nowrap;
  font-family:'Cormorant Garamond',serif;
}

body.lights-on #credit {
  color:rgba(0,0,20,0.15);
}

/* question – appears after 3rd click */
#question {
  position:fixed;
  bottom:clamp(60px,12vh,100px);
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  font-size:clamp(16px,1.8vw,22px);
  font-style:italic;
  color:rgba(255,255,255,0);
  transition:color 1.5s ease;
  white-space:nowrap;
  pointer-events:none;
  letter-spacing:0.06em;
  font-family:'Cormorant Garamond',serif;
}

#question.show {
  color:rgba(255,255,255,0.45);
}

body.lights-on #question.show {
  color:rgba(20,25,40,0.4);
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<!-- Room -->
<div id="room">
  <div id="room-dark">
    <img id="img-dark" src="./IMG_0439.JPG" alt="">
  </div>
  <div id="room-light">
    <img id="img-light" src="./IMG_0439.JPG" alt="">
  </div>
</div>

<!-- Text -->
<div id="text-wrap">
  <div id="title">Tuesday's Nightmare</div>
  <div id="story"></div>
</div>

<!-- Light switch -->
<div id="switch-area" onclick="toggleLight()">
  <div id="switch-plate">
    <div id="switch-toggle"></div>
  </div>
  <div id="switch-label"></div>
</div>

<div id="question"></div>
<div id="credit">Anna Greyhem</div>

<script>
var cursor = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

var isOn = false;
var clickCount = 0;
var storyShown = false;

var darkRoom = document.getElementById('room-dark');
var lightRoom = document.getElementById('room-light');
var flash = document.getElementById('flash');
var story = document.getElementById('story');
var question = document.getElementById('question');

var paragraphs = [
  "I woke up. It was dark in the room. I wanted to get up so I pressed the light switch. The light switch didn't work. I tried to push it again. My light switch always worked. This must be a dream. And I fear, I know that this is a scary dream.",
  "I woke up. I was relieved. What a heavy dream. It was still early, so the room was dark. I got up, told my boyfriend about this dream and turned on the light switch. It didn't work. This was a funny coincidence. I tried again and it didn't work. And I realized this must be a dream.",
  "I feared to wake up again.",
  "I woke up again."
];

function showStory(index) {
  if (index >= paragraphs.length) return;
  story.textContent = paragraphs[index];
  story.classList.remove('visible');
  void story.offsetWidth;
  setTimeout(function() { story.classList.add('visible'); }, 30);
}

// show first paragraph after a moment
setTimeout(function() { showStory(0); }, 1200);

function doFlash() {
  flash.style.transition = 'opacity 0.04s ease';
  flash.style.opacity = '0.7';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.18s ease';
    flash.style.opacity = '0';
  }, 50);
}

function toggleLight() {
  clickCount++;
  doFlash();

  isOn = !isOn;

  if (isOn) {
    lightRoom.style.opacity = '1';
    darkRoom.style.opacity = '0';
    document.body.classList.add('lights-on');
  } else {
    lightRoom.style.opacity = '0';
    darkRoom.style.opacity = '1';
    document.body.classList.remove('lights-on');
  }

  // update story paragraph
  if (clickCount === 1) {
    showStory(1);
  } else if (clickCount === 2) {
    showStory(2);
  } else if (clickCount === 3) {
    showStory(3);
    setTimeout(function() {
      question.textContent = 'Should I try the light switch again?';
      question.classList.add('show');
    }, 1800);
  }
}

// touch support
document.getElementById('switch-area').addEventListener('touchend', function(e) {
  e.preventDefault();
});
</script>
</body>
</html>
