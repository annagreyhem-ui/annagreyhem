<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuesday's Nightmare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; cursor:none; user-select:none; }

#room {
  position:fixed; inset:0;
}
#room img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}
#img-dark  { opacity:1; transition:opacity 0.08s ease; z-index:1; }
#img-light { opacity:0; transition:opacity 0.08s ease; z-index:2; }
body.on #img-dark  { opacity:0; }
body.on #img-light { opacity:1; }

/* invisible hotspot over the light switch */
#switch {
  position:fixed;
  /* switch position: ~27% from left, ~52% from top */
  left:  24%;
  top:   48%;
  width: 4%;
  height: 7%;
  z-index: 50;
  cursor: none;
  -webkit-tap-highlight-color: transparent;
}

/* flash on click */
#flash {
  position:fixed; inset:0; z-index:90;
  background:#fff; opacity:0;
  pointer-events:none;
  transition:opacity 0.2s ease;
}

#cursor {
  position:fixed; width:5px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:50%; pointer-events:none;
  z-index:9999; transform:translate(-50%,-50%);
  transition:background 0.4s;
}
body.on #cursor { background:rgba(0,0,0,0.28); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="flash"></div>

<div id="room">
  <img id="img-dark"  src="./room-dark.jpg"  alt="">
  <img id="img-light" src="./room-light.jpg" alt="">
</div>

<div id="switch"></div>

<script>
// cursor
var cur = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

var isOn = false;
var flash = document.getElementById('flash');

function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.6';
  setTimeout(function() {
    flash.style.transition = 'opacity 0.22s ease';
    flash.style.opacity = '0';
  }, 40);
}

function toggle() {
  doFlash();
  isOn = !isOn;
  document.body.classList.toggle('on', isOn);
}

var sw = document.getElementById('switch');
sw.addEventListener('click', toggle);
sw.addEventListener('touchend', function(e) {
  e.preventDefault();
  toggle();
});
</script>
</body>
</html>
